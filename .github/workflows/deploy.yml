name: Deploy to VPS (полная сверка)

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute repository tree hash
        id: repo_hash
        run: |
          HASH=$(git log -1 --format="%T" HEAD)
          echo "tree=$HASH" >> $GITHUB_OUTPUT
          echo "Repository tree hash: $HASH"

      - name: Deploy, restart, and full integrity check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            cd /var/www/fight-club

            # 1. Подтянуть код
            git pull origin main

            # 2. Установить зависимости (package.json в корне)
            npm install

            # 3. Перезапустить API
            pm2 restart fight-api

            # 4. Синхронизировать статику (с удалением лишнего)
            rsync -a --delete /var/www/fight-club/client/ /var/www/html/

            # 5. Дождаться ответа API
            for i in $(seq 1 15); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5001/auth/profile)
              if [ "$STATUS" = "401" ]; then
                echo "✅ API ответил 401"
                break
              fi
              echo "⏳ Попытка $i: статус $STATUS, ждём..."
              sleep 4
            done
            if [ "$STATUS" != "401" ]; then
              echo "❌ API не запустился (статус $STATUS)"
              exit 1
            fi

            # 6. Сверить хеш всего репозитория (дерево)
            REMOTE_HASH=$(git log -1 --format="%T" HEAD)
            LOCAL_HASH="${{ steps.repo_hash.outputs.tree }}"
            if [ "$LOCAL_HASH" != "$REMOTE_HASH" ]; then
              echo "❌ Хеш репозитория не совпадает! Код на сервере отличается от репозитория."
              echo "   Ожидался: $LOCAL_HASH"
              echo "   На сервере: $REMOTE_HASH"
              exit 1
            fi

            echo "🎉 Полный код идентичен репозиторию. Деплой успешен."
