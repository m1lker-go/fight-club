name: Deploy to VPS (без хеша)

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /var/www/fight-club

            git pull origin main
            npm install
            pm2 restart fight-api
            rsync -a --delete /var/www/fight-club/client/ /var/www/html/

            # Проверка, что API отвечает
            for i in $(seq 1 15); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5001/auth/profile)
              if [ "$STATUS" = "401" ]; then
                echo "✅ API ответил 401"
                break
              fi
              echo "⏳ Попытка $i: статус $STATUS, ждём..."
              sleep 4
            done
            if [ "$STATUS" != "401" ]; then
              echo "❌ API не запустился (статус $STATUS)"
              exit 1
            fi

            echo "🎉 Деплой завершён, API работает."
