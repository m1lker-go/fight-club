<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Fighting Balance Calculator</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1f2b;
            color: #fff;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            color: #00aaff;
            text-align: center;
        }
        .builder {
            background: #232833;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .class-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        .class-btn {
            background: #2f3542;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            color: #aaa;
            cursor: pointer;
            font-weight: bold;
        }
        .class-btn.active {
            background: #00aaff;
            color: white;
        }
        .subclass-select, .level-select {
            background: #2f3542;
            color: white;
            border: 1px solid #00aaff;
            border-radius: 20px;
            padding: 8px 16px;
            margin-left: 20px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        .stat-item {
            background: #2a303c;
            padding: 10px;
            border-radius: 8px;
        }
        .stat-label {
            font-weight: bold;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }
        .slider {
            width: 100%;
            margin: 5px 0;
        }
        input[type="number"] {
            width: 70px;
            background: #1a1f2b;
            color: white;
            border: 1px solid #00aaff;
            border-radius: 4px;
            padding: 4px;
            text-align: center;
        }
        .free-points {
            background: #00aaff20;
            border: 1px solid #00aaff;
            border-radius: 8px;
            padding: 10px;
            margin-top: 10px;
            text-align: center;
            font-weight: bold;
        }
        .result-panel {
            background: #2a303c;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
        }
        .result-row {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #3a4050;
            padding: 8px 0;
        }
        .fight-btn {
            background: #00aaff;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .fight-btn:hover {
            opacity: 0.9;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 8px;
            text-align: center;
            border-bottom: 1px solid #3a4050;
        }
        th {
            background: #1a1f2b;
            color: #00aaff;
        }
        .note {
            font-size: 12px;
            color: #aaa;
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>⚖️ Баланс классов — интерактивный калькулятор</h1>

    <div class="builder">
        <div class="class-selector">
            <button class="class-btn" data-class="warrior">Воин</button>
            <button class="class-btn" data-class="assassin">Ассасин</button>
            <button class="class-btn" data-class="mage">Маг</button>
            <select id="subclass" class="subclass-select"></select>
            <select id="level" class="level-select">
                <option value="1">Уровень 1</option>
                <option value="15">Уровень 15</option>
                <option value="30">Уровень 30</option>
                <option value="45">Уровень 45</option>
                <option value="60" selected>Уровень 60</option>
            </select>
        </div>

        <div class="stats-grid" id="skills"></div>
        <div id="freePointsDisplay" class="free-points">📊 Свободные очки: 0</div>

        <button id="simulateBtn" class="fight-btn">▶ Симуляция боя с эталоном</button>
        <div id="result" class="result-panel"></div>
    </div>

    <div class="result-panel">
        <h3>📊 Сравнение билдов (10 предустановленных)</h3>
        <div id="variations"></div>
    </div>
</div>

<script>
    // ---------- Базовые данные (из игры) ----------
    const baseStats = {
        warrior: { hp: 35, atk: 3, def: 5, agi: 2, int: 0, spd: 10, crit: 2, critDmg: 1.5, vamp: 0, reflect: 0 },
        assassin: { hp: 20, atk: 4, def: 1, agi: 5, int: 0, spd: 14, crit: 5, critDmg: 1.5, vamp: 0, reflect: 0 },
        mage: { hp: 20, atk: 3, def: 1, agi: 3, int: 6, spd: 14, crit: 3, critDmg: 1.5, vamp: 0, reflect: 0 }
    };

    // Бонусы подклассов (влияющие на статы)
    const subclassBonuses = {
        guardian: {},
        berserker: {},
        knight: { reflect: 20 },
        assassin: { critDmgBonus: 0.5 },
        venom_blade: {},
        blood_hunter: { vamp: 20 },
        pyromancer: {},
        cryomancer: {},
        illusionist: {}
    };

    const subclasses = {
        warrior: ['guardian', 'berserker', 'knight'],
        assassin: ['assassin', 'venom_blade', 'blood_hunter'],
        mage: ['pyromancer', 'cryomancer', 'illusionist']
    };

    const subclassNames = {
        guardian: 'Страж', berserker: 'Берсерк', knight: 'Рыцарь',
        assassin: 'Убийца', venom_blade: 'Ядовитый клинок', blood_hunter: 'Кровавый охотник',
        pyromancer: 'Поджигатель', cryomancer: 'Ледяной маг', illusionist: 'Иллюзионист'
    };

    // Список характеристик для прокачки (ключи и названия)
    const skillKeys = ['hp', 'atk', 'def', 'dodge', 'int', 'spd', 'crit', 'critDmg', 'vamp', 'reflect'];
    const skillNames = {
        hp: 'Здоровье', atk: 'Атака', def: 'Защита', dodge: 'Ловкость', int: 'Интеллект',
        spd: 'Скорость', crit: 'Шанс крита', critDmg: 'Крит. урон', vamp: 'Вампиризм', reflect: 'Отражение'
    };

    // Количество очков навыков в зависимости от уровня
    function getSkillPointsByLevel(level) {
        if (level <= 1) return 0;
        let points = 0;
        for (let lvl = 2; lvl <= level; lvl++) {
            points += (lvl <= 14) ? 3 : 5;
        }
        return points;
    }

    // Текущее состояние
    let currentClassName = 'warrior';
    let currentSubclass = 'guardian';
    let currentLevel = 60;
    let totalPoints = getSkillPointsByLevel(60);
    let currentDistribution = {};   // очки, вложенные в каждую характеристику
    let freePoints = totalPoints;    // свободные очки

    // DOM-элементы
    let sliders = {};
    let numberInputs = {};

    // Функция расчёта статов (аналог calculateClassStats)
    function calculateStats(className, subclass, distribution, level) {
        const base = baseStats[className];
        let stats = {
            hp: base.hp + (distribution.hp || 0) * 5,
            atk: base.atk + (distribution.atk || 0),
            def: base.def + (distribution.def || 0),
            agi: base.agi + (distribution.dodge || 0),
            int: base.int + (distribution.int || 0),
            spd: base.spd + (distribution.spd || 0),
            crit: base.crit + (distribution.crit || 0),
            critDmg: 1.5 + (distribution.critDmg || 0) / 50,
            vamp: base.vamp + (distribution.vamp || 0),
            reflect: base.reflect + (distribution.reflect || 0)
        };

        // Бонусы подкласса
        const bonus = subclassBonuses[subclass] || {};
        if (bonus.critDmgBonus) stats.critDmg += bonus.critDmgBonus;
        if (bonus.vamp) stats.vamp += bonus.vamp;
        if (bonus.reflect) stats.reflect += bonus.reflect;

        // Классовые особенности
        if (className === 'warrior') {
            stats.hp += Math.floor(stats.def / 5) * 5;
            stats.hp = Math.floor(stats.hp * 1.1);
        }
        if (className === 'assassin') {
            stats.spd += Math.floor(stats.agi / 5);
        }
        if (className === 'mage') {
            stats.agi += Math.floor(stats.int / 5);
        }

        // Ограничения
        stats.def = Math.min(70, stats.def);
        stats.agi = Math.min(70, stats.agi);
        stats.crit = Math.min(100, stats.crit);
        stats.critDmg = Math.min(stats.critDmg, 4.5);
        stats.level = level;
        return stats;
    }

    // Расчёт силы (power) по упрощённой формуле (все коэффициенты = 1 для простоты, можно уточнить)
    function calculatePower(stats) {
        let power = 0;
        power += stats.hp;
        power += stats.atk * 2;
        power += stats.def * 2;
        power += stats.agi * 2;
        power += stats.int * 2;
        power += stats.spd * 2;
        power += stats.crit * 3;
        power += (stats.critDmg - 1.5) * 100;
        power += stats.vamp * 3;
        power += stats.reflect * 2;
        power += stats.level * 10;
        return Math.round(power);
    }

    // Эффективный HP (с учётом защиты и уклонения)
    function effectiveHP(stats) {
        let reduction = stats.def / (stats.def + 100);
        let dodgeChance = stats.agi / (stats.agi + 100);
        let avgDamageMultiplier = (1 - dodgeChance) * (1 - reduction);
        if (avgDamageMultiplier <= 0) avgDamageMultiplier = 0.01;
        return Math.round(stats.hp / avgDamageMultiplier);
    }

    // Обновить все ползунки и числа в соответствии с currentDistribution
    function updateUI() {
        for (let key of skillKeys) {
            const val = currentDistribution[key] || 0;
            if (sliders[key]) {
                sliders[key].value = val;
                numberInputs[key].value = val;
            }
        }
        document.getElementById('freePointsDisplay').innerHTML = `📊 Свободные очки: ${freePoints}`;
    }

    // Пересчитать статы и обновить результаты
    function refreshStats() {
        const stats = calculateStats(currentClassName, currentSubclass, currentDistribution, currentLevel);
        const power = calculatePower(stats);
        const eHP = effectiveHP(stats);
        const resultDiv = document.getElementById('result');
        resultDiv.innerHTML = `
            <div class="result-row"><strong>${subclassNames[currentSubclass]} (${currentClassName === 'warrior' ? 'Воин' : currentClassName === 'assassin' ? 'Ассасин' : 'Маг'})</strong></div>
            <div class="result-row">❤️ HP: ${stats.hp}</div>
            <div class="result-row">⚔️ Атака: ${stats.atk}</div>
            <div class="result-row">🛡️ Защита: ${stats.def}%</div>
            <div class="result-row">🏃 Ловкость: ${stats.agi}% (уклонение)</div>
            <div class="result-row">🧠 Интеллект: ${stats.int}%</div>
            <div class="result-row">⚡ Скорость: ${stats.spd}</div>
            <div class="result-row">🎯 Шанс крита: ${stats.crit}%</div>
            <div class="result-row">💥 Крит. урон: ${(stats.critDmg*100).toFixed(0)}%</div>
            <div class="result-row">🩸 Вампиризм: ${stats.vamp}%</div>
            <div class="result-row">🛡️ Отражение: ${stats.reflect}%</div>
            <div class="result-row">📊 Сила (Power): ${power}</div>
            <div class="result-row">🛡️ Эффективный HP: ${eHP}</div>
        `;
        renderVariations(); // обновляем таблицу предустановленных билдов
    }

    // Изменение характеристики: delta = +1 или -1 (забираем из свободных или добавляем в свободные)
    function adjustStat(statKey, delta) {
        let oldVal = currentDistribution[statKey] || 0;
        let newVal = oldVal + delta;
        if (newVal < 0) newVal = 0;
        // Ограничение по максимуму (условное, но не жёсткое – пусть игрок сам решает, но статы потом ограничатся в расчётах)
        if (newVal > 272) newVal = 272;
        if (delta > 0) {
            // Увеличиваем – нужно взять очки из свободных
            if (freePoints >= delta) {
                currentDistribution[statKey] = newVal;
                freePoints -= delta;
            } else {
                // Недостаточно свободных очков
                return;
            }
        } else {
            // Уменьшаем – освободившиеся очки добавляем в свободные
            currentDistribution[statKey] = newVal;
            freePoints += delta; // delta отрицательный, так что прибавляем
        }
        updateUI();
        refreshStats();
    }

    // Сброс распределения к равномерному (каждой характеристике поровну, остаток в свободные)
    function resetToEqual() {
        let perStat = Math.floor(totalPoints / skillKeys.length);
        let remainder = totalPoints - perStat * skillKeys.length;
        for (let key of skillKeys) {
            currentDistribution[key] = perStat;
        }
        freePoints = remainder;
        updateUI();
        refreshStats();
    }

    // Создание интерфейса ползунков
    function renderSkills() {
        const container = document.getElementById('skills');
        container.innerHTML = '';
        for (let key of skillKeys) {
            const div = document.createElement('div');
            div.className = 'stat-item';
            div.innerHTML = `
                <div class="stat-label">
                    <span>${skillNames[key]}</span>
                    <input type="number" id="num_${key}" class="stat-number" value="0" min="0" max="272" step="1">
                </div>
                <input type="range" id="sld_${key}" class="slider" min="0" max="272" value="0" step="1">
            `;
            container.appendChild(div);
            const slider = div.querySelector(`#sld_${key}`);
            const number = div.querySelector(`#num_${key}`);
            sliders[key] = slider;
            numberInputs[key] = number;

            slider.addEventListener('input', (e) => {
                const newVal = parseInt(e.target.value);
                const oldVal = currentDistribution[key] || 0;
                const delta = newVal - oldVal;
                if (delta !== 0) adjustStat(key, delta);
            });
            number.addEventListener('input', (e) => {
                let newVal = parseInt(e.target.value);
                if (isNaN(newVal)) newVal = 0;
                if (newVal < 0) newVal = 0;
                if (newVal > 272) newVal = 272;
                const oldVal = currentDistribution[key] || 0;
                const delta = newVal - oldVal;
                if (delta !== 0) adjustStat(key, delta);
            });
        }
        // Кнопка сброса
        const resetBtn = document.createElement('button');
        resetBtn.textContent = '⟳ Сбросить к равномерному распределению';
        resetBtn.style.marginTop = '10px';
        resetBtn.style.padding = '8px 16px';
        resetBtn.style.background = '#2f3542';
        resetBtn.style.border = '1px solid #00aaff';
        resetBtn.style.borderRadius = '20px';
        resetBtn.style.color = 'white';
        resetBtn.style.cursor = 'pointer';
        resetBtn.addEventListener('click', resetToEqual);
        container.appendChild(resetBtn);
    }

    function updateSubclassSelect() {
        const select = document.getElementById('subclass');
        const list = subclasses[currentClassName];
        select.innerHTML = list.map(sc => `<option value="${sc}" ${currentSubclass === sc ? 'selected' : ''}>${subclassNames[sc]}</option>`).join('');
        currentSubclass = select.value;
        refreshStats();
    }

    function updateLevel() {
        currentLevel = parseInt(document.getElementById('level').value);
        totalPoints = getSkillPointsByLevel(currentLevel);
        // Пересчитываем свободные очки: текущее распределение может превышать totalPoints
        let spent = 0;
        for (let key of skillKeys) {
            spent += currentDistribution[key] || 0;
        }
        if (spent > totalPoints) {
            // Если потрачено больше, чем доступно для нового уровня – обрезаем
            let ratio = totalPoints / spent;
            for (let key of skillKeys) {
                currentDistribution[key] = Math.floor((currentDistribution[key] || 0) * ratio);
            }
            spent = totalPoints;
        }
        freePoints = totalPoints - spent;
        updateUI();
        refreshStats();
    }

    // Предустановленные билды (10 вариантов)
    function generateVariations() {
        const variations = [];
        // Базовое равномерное
        let base = {};
        skillKeys.forEach(k => base[k] = 0);
        // 1. Урон (атака, крит, крит урон)
        let v1 = { ...base }; v1.atk = 100; v1.crit = 50; v1.critDmg = 122; variations.push(v1);
        // 2. Защита + HP
        let v2 = { ...base }; v2.def = 100; v2.hp = 172; variations.push(v2);
        // 3. Скорость + ловкость
        let v3 = { ...base }; v3.spd = 100; v3.dodge = 172; variations.push(v3);
        // 4. Вампиризм + отражение + атака
        let v4 = { ...base }; v4.vamp = 80; v4.reflect = 80; v4.atk = 112; variations.push(v4);
        // 5. Интеллект + крит
        let v5 = { ...base }; v5.int = 150; v5.crit = 122; variations.push(v5);
        // 6. Сбалансированный (все поровну)
        let v6 = { ...base }; let each = Math.floor(totalPoints / skillKeys.length);
        skillKeys.forEach(k => v6[k] = each); variations.push(v6);
        // 7. Атака + защита
        let v7 = { ...base }; v7.atk = 136; v7.def = 136; variations.push(v7);
        // 8. Крит + крит урон
        let v8 = { ...base }; v8.crit = 100; v8.critDmg = 172; variations.push(v8);
        // 9. HP + вампиризм
        let v9 = { ...base }; v9.hp = 150; v9.vamp = 122; variations.push(v9);
        // 10. Ловкость + интеллект
        let v10 = { ...base }; v10.dodge = 136; v10.int = 136; variations.push(v10);
        return variations;
    }

    function renderVariations() {
        const container = document.getElementById('variations');
        const variations = generateVariations();
        const results = [];
        for (let i = 0; i < variations.length; i++) {
            const dist = variations[i];
            // Сумма очков может не совпадать с totalPoints, но для сравнения используем как есть
            const stats = calculateStats(currentClassName, currentSubclass, dist, currentLevel);
            const power = calculatePower(stats);
            const eHP = effectiveHP(stats);
            results.push({ name: `Билд ${i+1}`, power, eHP, atk: stats.atk, def: stats.def, spd: stats.spd, critDmg: stats.critDmg });
        }
        results.sort((a,b) => b.power - a.power);
        let html = '</table><thead><tr><th>Билд</th><th>Сила (Power)</th><th>Эфф. HP</th><th>Атака</th><th>Защита</th><th>Скорость</th><th>Крит. урон</th></tr></thead><tbody>';
        results.forEach(r => {
            html += `<tr><td>${r.name}</td><td>${r.power}</td><td>${r.eHP}</td><td>${r.atk}</td><td>${r.def}%</td><td>${r.spd}</td><td>${(r.critDmg*100).toFixed(0)}%</td></tr>`;
        });
        html += '</tbody></table>';
        container.innerHTML = html;
    }

    // Симуляция боя (упрощённая)
    function simulateFight(stats1, stats2) {
        let wins1 = 0, wins2 = 0;
        for (let i = 0; i < 1000; i++) {
            let hp1 = effectiveHP(stats1);
            let hp2 = effectiveHP(stats2);
            while (hp1 > 0 && hp2 > 0) {
                let crit1 = Math.random() < stats1.crit/100;
                let dmg1 = stats1.atk * (crit1 ? stats1.critDmg : 1);
                hp2 -= dmg1;
                if (hp2 <= 0) { wins1++; break; }
                let crit2 = Math.random() < stats2.crit/100;
                let dmg2 = stats2.atk * (crit2 ? stats2.critDmg : 1);
                hp1 -= dmg2;
                if (hp1 <= 0) { wins2++; break; }
            }
        }
        return { wins1, wins2 };
    }

    function onSimulate() {
        const stats = calculateStats(currentClassName, currentSubclass, currentDistribution, currentLevel);
        // Эталон: воин-страж, 100 HP, 50 атака, 122 защиты, остальное 0
        const distRef = { hp: 100, atk: 50, def: 122, dodge:0, int:0, spd:0, crit:0, critDmg:0, vamp:0, reflect:0 };
        const refStats = calculateStats('warrior', 'guardian', distRef, 60);
        const result = simulateFight(stats, refStats);
        const resultDiv = document.getElementById('result');
        resultDiv.innerHTML += `<div style="margin-top:20px; background:#2a303c; padding:10px; border-radius:8px;">📊 Результат симуляции 1000 боёв: Побед вашего билда: ${result.wins1}, побед эталона: ${result.wins2} (${(result.wins1/10).toFixed(1)}%)</div>`;
    }

    // Инициализация
    function init() {
        currentLevel = 60;
        totalPoints = getSkillPointsByLevel(60);
        resetToEqual();

        renderSkills();

        document.querySelectorAll('.class-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.class-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentClassName = btn.dataset.class;
                updateSubclassSelect();
                refreshStats();
            });
        });
        document.getElementById('subclass').addEventListener('change', (e) => {
            currentSubclass = e.target.value;
            refreshStats();
        });
        document.getElementById('level').addEventListener('change', () => {
            updateLevel();
        });
        document.getElementById('simulateBtn').addEventListener('click', onSimulate);

        // Устанавливаем активный класс по умолчанию
        document.querySelector('.class-btn[data-class="warrior"]').classList.add('active');
        updateSubclassSelect();
        refreshStats();
    }

    init();
</script>
</body>
</html>
