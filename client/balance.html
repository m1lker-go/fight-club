<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Fighting Balance Calculator</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1f2b;
            color: #fff;
            margin: 0;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { color: #00aaff; text-align: center; }
        .builder {
            background: #232833;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .class-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        .class-btn {
            background: #2f3542;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            color: #aaa;
            cursor: pointer;
            font-weight: bold;
        }
        .class-btn.active {
            background: #00aaff;
            color: white;
        }
        .subclass-select, .level-select {
            background: #2f3542;
            color: white;
            border: 1px solid #00aaff;
            border-radius: 20px;
            padding: 8px 16px;
            margin-left: 20px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        .stat-item {
            background: #2a303c;
            padding: 10px;
            border-radius: 8px;
        }
        .stat-label {
            font-weight: bold;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }
        .slider { width: 100%; margin: 5px 0; }
        input[type="number"] {
            width: 70px;
            background: #1a1f2b;
            color: white;
            border: 1px solid #00aaff;
            border-radius: 4px;
            padding: 4px;
            text-align: center;
        }
        .free-points {
            background: #00aaff20;
            border: 1px solid #00aaff;
            border-radius: 8px;
            padding: 10px;
            margin-top: 10px;
            text-align: center;
            font-weight: bold;
        }
        .result-panel {
            background: #2a303c;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
        }
        .result-row {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #3a4050;
            padding: 8px 0;
        }
        .fight-btn {
            background: #00aaff;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .fight-btn:hover { opacity: 0.9; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 8px;
            text-align: center;
            border-bottom: 1px solid #3a4050;
        }
        th {
            background: #1a1f2b;
            color: #00aaff;
        }
        .button-group {
            display: flex;
            gap: 12px;
            justify-content: flex-start;
            margin-top: 20px;
            margin-bottom: 10px;
        }
        .action-btn {
            background: #2f3542;
            border: 1px solid #00aaff;
            padding: 8px 20px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .action-btn:hover {
            background: #00aaff;
            color: #1a1f2b;
            border-color: white;
        }
        .danger-btn {
            border-color: #ff5555;
            color: #ffaaaa;
        }
        .danger-btn:hover {
            background: #ff5555;
            color: #1a1f2b;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>⚖️ Баланс классов — интерактивный калькулятор</h1>
    <div class="builder">
        <div class="class-selector">
            <button class="class-btn" data-class="warrior">Воин</button>
            <button class="class-btn" data-class="assassin">Ассасин</button>
            <button class="class-btn" data-class="mage">Маг</button>
            <select id="subclass" class="subclass-select"></select>
            <select id="level" class="level-select">
                <option value="1">Уровень 1</option>
                <option value="15">Уровень 15</option>
                <option value="30">Уровень 30</option>
                <option value="45">Уровень 45</option>
                <option value="60" selected>Уровень 60</option>
            </select>
        </div>
        <div class="stats-grid" id="skills"></div>
        <div id="freePointsDisplay" class="free-points">📊 Свободные очки: 0</div>
        <div class="button-group">
            <button id="equalResetBtn" class="action-btn">⟳ Сбросить к равномерному</button>
            <button id="fullResetBtn" class="action-btn danger-btn">🗑 СБРОСИТЬ ВСЁ</button>
        </div>
        <button id="simulateBtn" class="fight-btn">▶ Симуляция боя с 1000 противников</button>
        <div id="result" class="result-panel"></div>
    </div>
    <div class="result-panel">
        <h3>📊 Сравнение билдов (10 предустановленных)</h3>
        <div id="variations"></div>
    </div>
</div>

<script>
    // ---------- БАЗОВЫЕ ДАННЫЕ ----------
    const baseStats = {
        warrior: { hp: 35, atk: 3, def: 5, agi: 2, int: 0, spd: 10, crit: 2, critDmg: 1.5, vamp: 0, reflect: 0 },
        assassin: { hp: 20, atk: 4, def: 1, agi: 5, int: 0, spd: 14, crit: 5, critDmg: 1.5, vamp: 0, reflect: 0 },
        mage: { hp: 20, atk: 3, def: 1, agi: 3, int: 6, spd: 14, crit: 3, critDmg: 1.5, vamp: 0, reflect: 0 }
    };

    const subclassBonuses = {
        guardian: {}, berserker: {}, knight: { reflect: 20 },
        assassin: { critDmgBonus: 0.5 }, venom_blade: {}, blood_hunter: { vamp: 20 },
        pyromancer: {}, cryomancer: {}, illusionist: {}
    };

    const subclasses = {
        warrior: ['guardian', 'berserker', 'knight'],
        assassin: ['assassin', 'venom_blade', 'blood_hunter'],
        mage: ['pyromancer', 'cryomancer', 'illusionist']
    };

    const subclassNames = {
        guardian: 'Страж', berserker: 'Берсерк', knight: 'Рыцарь',
        assassin: 'Убийца', venom_blade: 'Ядовитый клинок', blood_hunter: 'Кровавый охотник',
        pyromancer: 'Поджигатель', cryomancer: 'Ледяной маг', illusionist: 'Иллюзионист'
    };

    const skillKeys = ['hp', 'atk', 'def', 'dodge', 'int', 'spd', 'crit', 'critDmg', 'vamp', 'reflect'];
    const skillNames = {
        hp: 'Здоровье', atk: 'Атака', def: 'Защита', dodge: 'Ловкость', int: 'Интеллект',
        spd: 'Скорость', crit: 'Шанс крита', critDmg: 'Крит. урон', vamp: 'Вампиризм', reflect: 'Отражение'
    };

    const skillMax = { hp: 272, atk: 272, def: 70, dodge: 70, int: 272, spd: 272, crit: 100, critDmg: 272, vamp: 272, reflect: 272 };

    function getSkillPointsByLevel(level) {
        if (level <= 1) return 0;
        let points = 0;
        for (let lvl = 2; lvl <= level; lvl++) {
            points += (lvl <= 14) ? 3 : 5;
        }
        return points;
    }

    // ---------- СОСТОЯНИЕ ----------
    let currentClassName = 'warrior';
    let currentSubclass = 'guardian';
    let currentLevel = 60;
    let totalPoints = getSkillPointsByLevel(60);
    let currentDistribution = {};
    let freePoints = totalPoints;
    let sliders = {};
    let numberInputs = {};

    // ---------- РАСЧЁТ СТАТОВ ----------
    function calculateStats(className, subclass, distribution, level) {
        const base = baseStats[className];
        let stats = {
            hp: base.hp + (distribution.hp || 0) * 5,
            atk: base.atk + (distribution.atk || 0),
            def: base.def + (distribution.def || 0),
            agi: base.agi + (distribution.dodge || 0),
            int: base.int + (distribution.int || 0),
            spd: base.spd + (distribution.spd || 0),
            crit: base.crit + (distribution.crit || 0),
            critDmg: 1.5 + (distribution.critDmg || 0) / 50,
            vamp: base.vamp + (distribution.vamp || 0),
            reflect: base.reflect + (distribution.reflect || 0)
        };
        const bonus = subclassBonuses[subclass] || {};
        if (bonus.critDmgBonus) stats.critDmg += bonus.critDmgBonus;
        if (bonus.vamp) stats.vamp += bonus.vamp;
        if (bonus.reflect) stats.reflect += bonus.reflect;

        if (className === 'warrior') {
            stats.hp += Math.floor(stats.def / 5) * 5;
            stats.hp = Math.floor(stats.hp * 1.1);
        }
        if (className === 'assassin') {
            stats.spd += Math.floor(stats.agi / 5);
        }
        if (className === 'mage') {
            stats.agi += Math.floor(stats.int / 5);
        }

        stats.def = Math.min(70, stats.def);
        stats.agi = Math.min(70, stats.agi);
        stats.crit = Math.min(100, stats.crit);
        stats.critDmg = Math.min(4.5, stats.critDmg);
        stats.level = level;
        return stats;
    }

    function calculatePower(stats) {
        let power = 0;
        power += stats.hp;
        power += stats.atk * 2;
        power += stats.def * 2;
        power += stats.agi * 2;
        power += stats.int * 2;
        power += stats.spd * 2;
        power += stats.crit * 3;
        power += (stats.critDmg - 1.5) * 100;
        power += stats.vamp * 3;
        power += stats.reflect * 2;
        power += stats.level * 10;
        return Math.round(power);
    }

    // Функция для симуляции одного удара с учётом защиты, уклонения, вампиризма, отражения
    function performAttack(attacker, defender, isAttacker) {
        // Уклонение
        let dodgeChance = defender.agi / 100;
        if (Math.random() < dodgeChance) return 0; // промах
        
        let crit = Math.random() < (attacker.crit / 100);
        let rawDamage = attacker.atk * (crit ? attacker.critDmg : 1);
        let reduction = defender.def / (defender.def + 100);
        let finalDamage = Math.max(1, Math.floor(rawDamage * (1 - reduction)));
        
        // Вампиризм атакующего
        if (finalDamage > 0 && attacker.vamp > 0) {
            let heal = Math.floor(finalDamage * (attacker.vamp / 100));
            // heal будет применён после расчёта урона, но в пошаговой логике мы добавляем здоровье атакующему
            // возвращаем объект, чтобы обработать и урон, и лечение
            return { damage: finalDamage, vampHeal: heal };
        }
        return { damage: finalDamage, vampHeal: 0 };
    }

    // Полноценный бой с учётом всех механик
    function fight(playerStats, enemyStats) {
        let hpPlayer = playerStats.hp;
        let hpEnemy = enemyStats.hp;
        
        while (hpPlayer > 0 && hpEnemy > 0) {
            // Ход игрока
            let attackResult = performAttack(playerStats, enemyStats, true);
            let dmg = attackResult.damage;
            hpEnemy -= dmg;
            if (attackResult.vampHeal > 0) {
                hpPlayer = Math.min(playerStats.hp, hpPlayer + attackResult.vampHeal);
            }
            // Отражение врага
            if (dmg > 0 && enemyStats.reflect > 0) {
                let reflectDmg = Math.floor(dmg * (enemyStats.reflect / 100));
                hpPlayer -= reflectDmg;
            }
            if (hpEnemy <= 0) return true;
            
            // Ход врага
            let enemyAttack = performAttack(enemyStats, playerStats, false);
            let dmgE = enemyAttack.damage;
            hpPlayer -= dmgE;
            if (enemyAttack.vampHeal > 0) {
                hpEnemy = Math.min(enemyStats.hp, hpEnemy + enemyAttack.vampHeal);
            }
            // Отражение игрока
            if (dmgE > 0 && playerStats.reflect > 0) {
                let reflectDmgP = Math.floor(dmgE * (playerStats.reflect / 100));
                hpEnemy -= reflectDmgP;
            }
            if (hpPlayer <= 0) return false;
        }
        return hpPlayer > 0;
    }

    // ---------- ГЕНЕРАЦИЯ ПРОТИВНИКОВ (используют все очки) ----------
    function generateBuildForClass(className, totalPts) {
        let dist = {};
        skillKeys.forEach(k => dist[k] = 0);
        let remaining = totalPts;
        
        function addPoints(stat, maxVal, priorityPercent) {
            if (remaining <= 0) return;
            let maxForStat = Math.min(maxVal, skillMax[stat]);
            let current = dist[stat] || 0;
            let possible = maxForStat - current;
            if (possible <= 0) return;
            let take = Math.floor(remaining * (priorityPercent / 100));
            take = Math.min(possible, take);
            if (take > 0) {
                dist[stat] = current + take;
                remaining -= take;
            }
        }
        
        if (className === 'warrior') {
            while (remaining > 0) {
                let oldRem = remaining;
                addPoints('hp', 272, 30);
                addPoints('def', 70, 25);
                addPoints('atk', 272, 20);
                addPoints('reflect', 272, 10);
                addPoints('crit', 100, 8);
                addPoints('vamp', 272, 7);
                if (remaining === oldRem) break;
            }
        } 
        else if (className === 'assassin') {
            while (remaining > 0) {
                let oldRem = remaining;
                addPoints('dodge', 70, 25);
                addPoints('atk', 272, 20);
                addPoints('crit', 100, 20);
                addPoints('critDmg', 272, 15);
                addPoints('vamp', 272, 10);
                addPoints('hp', 272, 5);
                addPoints('spd', 272, 5);
                if (remaining === oldRem) break;
            }
        }
        else if (className === 'mage') {
            while (remaining > 0) {
                let oldRem = remaining;
                addPoints('int', 272, 45);
                addPoints('dodge', 70, 20);
                addPoints('hp', 272, 20);
                addPoints('crit', 100, 10);
                addPoints('spd', 272, 5);
                if (remaining === oldRem) break;
            }
        }
        
        // Оставшиеся очки распределяем равномерно по всем, кто не достиг лимита
        if (remaining > 0) {
            let keys = skillKeys.filter(k => (dist[k] || 0) < skillMax[k]);
            while (remaining > 0 && keys.length) {
                for (let k of keys) {
                    if (remaining <= 0) break;
                    if ((dist[k] || 0) < skillMax[k]) {
                        dist[k] = (dist[k] || 0) + 1;
                        remaining--;
                    }
                }
                keys = skillKeys.filter(k => (dist[k] || 0) < skillMax[k]);
            }
        }
        
        for (let k of skillKeys) {
            if (dist[k] > skillMax[k]) dist[k] = skillMax[k];
        }
        return dist;
    }

    function getRandomClassAndSubclass() {
        const classes = ['warrior', 'assassin', 'mage'];
        const randClass = classes[Math.floor(Math.random() * 3)];
        const subList = subclasses[randClass];
        const randSub = subList[Math.floor(Math.random() * subList.length)];
        return { className: randClass, subclass: randSub };
    }

    function generateEnemies(level) {
        const totalPts = getSkillPointsByLevel(level);
        const enemies = [];
        for (let i = 0; i < 1000; i++) {
            const { className, subclass } = getRandomClassAndSubclass();
            const distribution = generateBuildForClass(className, totalPts);
            enemies.push({ className, subclass, distribution, level });
        }
        return enemies;
    }

    // ---------- СИМУЛЯЦИЯ ----------
    async function runSimulation() {
        const btn = document.getElementById('simulateBtn');
        btn.disabled = true;
        btn.textContent = '⏳ Симуляция... 0/1000';
        
        const playerStats = calculateStats(currentClassName, currentSubclass, currentDistribution, currentLevel);
        const enemies = generateEnemies(currentLevel);
        let wins = 0;
        
        for (let i = 0; i < enemies.length; i++) {
            const e = enemies[i];
            const enemyStats = calculateStats(e.className, e.subclass, e.distribution, e.level);
            if (fight(playerStats, enemyStats)) wins++;
            if ((i + 1) % 100 === 0 || i === enemies.length - 1) {
                btn.textContent = `⏳ Симуляция... ${i+1}/1000`;
                await new Promise(r => setTimeout(r, 5));
            }
        }
        
        const winRate = (wins / 10).toFixed(1);
        const resultDiv = document.getElementById('result');
        const simBlock = document.createElement('div');
        simBlock.style.marginTop = '20px';
        simBlock.style.background = '#1a1f2b';
        simBlock.style.padding = '12px';
        simBlock.style.borderRadius = '8px';
        simBlock.style.borderLeft = '4px solid #00aaff';
        simBlock.innerHTML = `⚔️ РЕЗУЛЬТАТ СИМУЛЯЦИИ (1000 уникальных противников, уровень ${currentLevel})<br>
                              🏆 Побед: ${wins} из 1000 (${winRate}%)<br>
                              📊 Противники используют все очки навыков (${totalPoints} очков) с разумными приоритетами.`;
        const oldSim = resultDiv.querySelector('.sim-result');
        if (oldSim) oldSim.remove();
        simBlock.className = 'sim-result';
        resultDiv.appendChild(simBlock);
        
        btn.disabled = false;
        btn.textContent = '▶ Симуляция боя с 1000 противников';
    }

    // ---------- UI ОБНОВЛЕНИЯ ----------
    function updateUI() {
        for (let key of skillKeys) {
            const val = currentDistribution[key] || 0;
            if (sliders[key]) {
                sliders[key].value = val;
                numberInputs[key].value = val;
            }
        }
        document.getElementById('freePointsDisplay').innerHTML = `📊 Свободные очки: ${freePoints}`;
    }

    function refreshStats() {
        const stats = calculateStats(currentClassName, currentSubclass, currentDistribution, currentLevel);
        const power = calculatePower(stats);
        const resultDiv = document.getElementById('result');
        const oldSim = resultDiv.querySelector('.sim-result');
        resultDiv.innerHTML = `
            <div class="result-row"><strong>${subclassNames[currentSubclass]} (${currentClassName === 'warrior' ? 'Воин' : currentClassName === 'assassin' ? 'Ассасин' : 'Маг'})</strong></div>
            <div class="result-row">❤️ HP: ${stats.hp}</div>
            <div class="result-row">⚔️ Атака: ${stats.atk}</div>
            <div class="result-row">🛡️ Защита: ${stats.def}%</div>
            <div class="result-row">🏃 Ловкость: ${stats.agi}%</div>
            <div class="result-row">🧠 Интеллект: ${stats.int}%</div>
            <div class="result-row">⚡ Скорость: ${stats.spd}</div>
            <div class="result-row">🎯 Шанс крита: ${stats.crit}%</div>
            <div class="result-row">💥 Крит. урон: ${(stats.critDmg*100).toFixed(0)}%</div>
            <div class="result-row">🩸 Вампиризм: ${stats.vamp}%</div>
            <div class="result-row">🛡️ Отражение: ${stats.reflect}%</div>
            <div class="result-row">📊 Сила (Power): ${power}</div>
        `;
        if (oldSim) resultDiv.appendChild(oldSim);
        renderVariations();
    }

    function adjustStat(statKey, delta) {
        if (delta === 0) return;
        let oldVal = currentDistribution[statKey] || 0;
        let newVal = oldVal + delta;
        const maxVal = skillMax[statKey];
        newVal = Math.min(maxVal, Math.max(0, newVal));
        const realDelta = newVal - oldVal;
        if (realDelta === 0) return;
        if (realDelta > 0) {
            if (freePoints >= realDelta) {
                currentDistribution[statKey] = newVal;
                freePoints -= realDelta;
            } else return;
        } else {
            currentDistribution[statKey] = newVal;
            freePoints += -realDelta;
        }
        updateUI();
        refreshStats();
    }

    function resetToEqual() {
        let perStat = Math.floor(totalPoints / skillKeys.length);
        let remainder = totalPoints - perStat * skillKeys.length;
        for (let key of skillKeys) {
            let val = perStat;
            if (val > skillMax[key]) val = skillMax[key];
            currentDistribution[key] = val;
        }
        let spent = 0;
        for (let key of skillKeys) spent += currentDistribution[key];
        freePoints = totalPoints - spent;
        if (freePoints < 0) freePoints = 0;
        updateUI();
        refreshStats();
    }

    function resetAll() {
        for (let key of skillKeys) currentDistribution[key] = 0;
        freePoints = totalPoints;
        updateUI();
        refreshStats();
    }

    function renderSkills() {
        const container = document.getElementById('skills');
        container.innerHTML = '';
        for (let key of skillKeys) {
            const div = document.createElement('div');
            div.className = 'stat-item';
            div.innerHTML = `
                <div class="stat-label">
                    <span>${skillNames[key]}</span>
                    <input type="number" id="num_${key}" class="stat-number" value="0" min="0" max="${skillMax[key]}" step="1">
                </div>
                <input type="range" id="sld_${key}" class="slider" min="0" max="${skillMax[key]}" value="0" step="1">
            `;
            container.appendChild(div);
            const slider = div.querySelector(`#sld_${key}`);
            const number = div.querySelector(`#num_${key}`);
            sliders[key] = slider;
            numberInputs[key] = number;
            slider.addEventListener('input', (e) => {
                let newVal = parseInt(e.target.value);
                if (isNaN(newVal)) newVal = 0;
                const oldVal = currentDistribution[key] || 0;
                const delta = newVal - oldVal;
                if (delta !== 0) adjustStat(key, delta);
            });
            number.addEventListener('input', (e) => {
                let newVal = parseInt(e.target.value);
                if (isNaN(newVal)) newVal = 0;
                newVal = Math.min(skillMax[key], Math.max(0, newVal));
                const oldVal = currentDistribution[key] || 0;
                const delta = newVal - oldVal;
                if (delta !== 0) adjustStat(key, delta);
            });
        }
    }

    function updateSubclassSelect() {
        const select = document.getElementById('subclass');
        const list = subclasses[currentClassName];
        select.innerHTML = list.map(sc => `<option value="${sc}" ${currentSubclass === sc ? 'selected' : ''}>${subclassNames[sc]}</option>`).join('');
        currentSubclass = select.value;
        refreshStats();
    }

    function updateLevel() {
        currentLevel = parseInt(document.getElementById('level').value);
        const newTotalPoints = getSkillPointsByLevel(currentLevel);
        let spent = 0;
        for (let key of skillKeys) spent += currentDistribution[key] || 0;
        if (newTotalPoints !== totalPoints) {
            totalPoints = newTotalPoints;
            if (spent > totalPoints) {
                let ratio = totalPoints / spent;
                for (let key of skillKeys) {
                    let newVal = Math.floor((currentDistribution[key] || 0) * ratio);
                    newVal = Math.min(skillMax[key], newVal);
                    currentDistribution[key] = newVal;
                }
                let newSpent = 0;
                for (let key of skillKeys) newSpent += currentDistribution[key];
                freePoints = totalPoints - newSpent;
                if (freePoints < 0) freePoints = 0;
            } else {
                freePoints = totalPoints - spent;
            }
            updateUI();
            refreshStats();
        }
    }

    // Предустановленные билды для таблицы сравнения
    function generateVariations() {
        const pts = totalPoints;
        let base = {};
        skillKeys.forEach(k => base[k] = 0);
        let v1 = { ...base }; v1.atk = Math.min(272, Math.floor(pts * 0.35)); v1.crit = Math.min(100, Math.floor(pts * 0.25)); v1.critDmg = pts - v1.atk - v1.crit; 
        let v2 = { ...base }; v2.def = Math.min(70, Math.floor(pts * 0.4)); v2.hp = pts - v2.def; 
        let v3 = { ...base }; v3.spd = Math.min(272, Math.floor(pts * 0.45)); v3.dodge = pts - v3.spd; 
        let v4 = { ...base }; v4.vamp = Math.min(272, Math.floor(pts * 0.3)); v4.reflect = Math.min(272, Math.floor(pts * 0.3)); v4.atk = pts - v4.vamp - v4.reflect; 
        let v5 = { ...base }; v5.int = Math.min(272, Math.floor(pts * 0.6)); v5.crit = pts - v5.int; 
        let v6 = { ...base }; let each = Math.floor(pts / skillKeys.length); skillKeys.forEach(k => v6[k] = each); 
        let v7 = { ...base }; v7.atk = Math.floor(pts * 0.5); v7.def = Math.min(70, pts - v7.atk); 
        let v8 = { ...base }; v8.crit = Math.min(100, Math.floor(pts * 0.4)); v8.critDmg = pts - v8.crit; 
        let v9 = { ...base }; v9.hp = Math.floor(pts * 0.55); v9.vamp = pts - v9.hp; 
        let v10 = { ...base }; v10.dodge = Math.min(70, Math.floor(pts * 0.5)); v10.int = pts - v10.dodge; 
        return [v1, v2, v3, v4, v5, v6, v7, v8, v9, v10];
    }
    
    function renderVariations() {
        const container = document.getElementById('variations');
        const variations = generateVariations();
        const results = [];
        for (let i = 0; i < variations.length; i++) {
            const dist = variations[i];
            const stats = calculateStats(currentClassName, currentSubclass, dist, currentLevel);
            const power = calculatePower(stats);
            results.push({ name: `Билд ${i+1}`, power, atk: stats.atk, def: stats.def, spd: stats.spd, critDmg: stats.critDmg });
        }
        results.sort((a,b) => b.power - a.power);
        let html = '<thead><tr><th>Билд</th><th>Сила</th><th>Атака</th><th>Защита</th><th>Скорость</th><th>Крит. урон</th></tr></thead><tbody>';
        results.forEach(r => {
            html += `<tr><td>${r.name}</td><td>${r.power}</td><td>${r.atk}</td><td>${r.def}%</td><td>${r.spd}</td><td>${(r.critDmg*100).toFixed(0)}%</td></tr>`;
        });
        html += '</tbody>';
        container.innerHTML = html;
    }

    // ---------- ИНИЦИАЛИЗАЦИЯ ----------
    function init() {
        currentLevel = 60;
        totalPoints = getSkillPointsByLevel(60);
        resetAll();
        renderSkills();
        document.getElementById('equalResetBtn').addEventListener('click', resetToEqual);
        document.getElementById('fullResetBtn').addEventListener('click', resetAll);
        document.getElementById('simulateBtn').addEventListener('click', runSimulation);
        document.querySelectorAll('.class-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.class-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentClassName = btn.dataset.class;
                updateSubclassSelect();
                refreshStats();
            });
        });
        document.getElementById('subclass').addEventListener('change', (e) => {
            currentSubclass = e.target.value;
            refreshStats();
        });
        document.getElementById('level').addEventListener('change', () => updateLevel());
        document.querySelector('.class-btn[data-class="warrior"]').classList.add('active');
        updateSubclassSelect();
        refreshStats();
    }
    init();
</script>
</body>
