<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Fighting Balance Calculator — полная механика (финал)</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1f2b;
            color: #fff;
            margin: 0;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { color: #00aaff; text-align: center; }
        .builder {
            background: #232833;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .class-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        .class-btn {
            background: #2f3542;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            color: #aaa;
            cursor: pointer;
            font-weight: bold;
        }
        .class-btn.active {
            background: #00aaff;
            color: white;
        }
        .subclass-select, .level-select {
            background: #2f3542;
            color: white;
            border: 1px solid #00aaff;
            border-radius: 20px;
            padding: 8px 16px;
            margin-left: 20px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        .stat-item {
            background: #2a303c;
            padding: 10px;
            border-radius: 8px;
        }
        .stat-label {
            font-weight: bold;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }
        .slider { width: 100%; margin: 5px 0; }
        input[type="number"] {
            width: 70px;
            background: #1a1f2b;
            color: white;
            border: 1px solid #00aaff;
            border-radius: 4px;
            padding: 4px;
            text-align: center;
        }
        .free-points {
            background: #00aaff20;
            border: 1px solid #00aaff;
            border-radius: 8px;
            padding: 10px;
            margin-top: 10px;
            text-align: center;
            font-weight: bold;
        }
        .result-panel {
            background: #2a303c;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
        }
        .result-row {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #3a4050;
            padding: 8px 0;
        }
        .fight-btn {
            background: #00aaff;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .fight-btn:hover { opacity: 0.9; }
        .button-group {
            display: flex;
            gap: 12px;
            justify-content: flex-start;
            margin-top: 20px;
            margin-bottom: 10px;
        }
        .action-btn {
            background: #2f3542;
            border: 1px solid #00aaff;
            padding: 8px 20px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .action-btn:hover {
            background: #00aaff;
            color: #1a1f2b;
            border-color: white;
        }
        .danger-btn {
            border-color: #ff5555;
            color: #ffaaaa;
        }
        .danger-btn:hover {
            background: #ff5555;
            color: #1a1f2b;
        }
        .sim-result {
            margin-top: 20px;
            background: #1a1f2b;
            padding: 12px;
            border-radius: 8px;
            border-left: 4px solid #00aaff;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<div class="container">
    <h1>⚖️ Калькулятор баланса (полная механика)</h1>
    <div class="builder">
        <div class="class-selector">
            <button class="class-btn" data-class="warrior">Воин</button>
            <button class="class-btn" data-class="assassin">Ассасин</button>
            <button class="class-btn" data-class="mage">Маг</button>
            <select id="subclass" class="subclass-select"></select>
            <select id="level" class="level-select">
                <option value="1">Уровень 1</option>
                <option value="15">Уровень 15</option>
                <option value="30">Уровень 30</option>
                <option value="45">Уровень 45</option>
                <option value="60" selected>Уровень 60</option>
            </select>
        </div>
        <div class="stats-grid" id="skills"></div>
        <div id="freePointsDisplay" class="free-points">📊 Свободные очки: 0</div>
        <div class="button-group">
            <button id="equalResetBtn" class="action-btn">⟳ Равномерно</button>
            <button id="fullResetBtn" class="action-btn danger-btn">🗑 Сбросить всё</button>
        </div>
        <button id="simulateBtn" class="fight-btn">▶ Симуляция 1000 боёв (все механики)</button>
        <div id="result" class="result-panel"></div>
    </div>
</div>

<script>
    // ==================== БАЗОВЫЕ ДАННЫЕ ====================
    const baseStats = {
        warrior: { hp: 30, atk: 3, def: 5, agi: 2, int: 0, spd: 10, crit: 2, critDmg: 1.5, vamp: 0, reflect: 0 },
        assassin: { hp: 15, atk: 4, def: 1, agi: 5, int: 0, spd: 14, crit: 5, critDmg: 1.5, vamp: 0, reflect: 0 },
        mage: { hp: 15, atk: 3, def: 1, agi: 3, int: 6, spd: 14, crit: 3, critDmg: 1.5, vamp: 0, reflect: 0 }
    };

    const rolePassives = {
        guardian: { defenseBonus: 10, blockChance: 20 },
        berserker: { rage: true },
        knight: { reflect: 20 },
        assassin: { critMultiplier: 2.5 },      // +50% крит урона
        venom_blade: { poison: true },
        blood_hunter: { vamp: 20 },
        pyromancer: { burn: true },
        cryomancer: { freezeChance: 25 },
        illusionist: { mirageGuaranteed: true }
    };

    const subclasses = {
        warrior: ['guardian', 'berserker', 'knight'],
        assassin: ['assassin', 'venom_blade', 'blood_hunter'],
        mage: ['pyromancer', 'cryomancer', 'illusionist']
    };

    const subclassNames = {
        guardian: 'Страж', berserker: 'Берсерк', knight: 'Рыцарь',
        assassin: 'Убийца', venom_blade: 'Ядовитый клинок', blood_hunter: 'Кровавый охотник',
        pyromancer: 'Поджигатель', cryomancer: 'Ледяной маг', illusionist: 'Иллюзионист'
    };

    const skillKeys = ['hp', 'atk', 'def', 'dodge', 'int', 'spd', 'crit', 'critDmg', 'vamp', 'reflect'];
    const skillNames = {
        hp: 'Здоровье', atk: 'Атака', def: 'Защита', dodge: 'Ловкость', int: 'Интеллект',
        spd: 'Скорость', crit: 'Шанс крита', critDmg: 'Крит. урон', vamp: 'Вампиризм', reflect: 'Отражение'
    };
    // Абсолютные максимумы (без учёта базы)
    const absoluteMax = { hp: 272, atk: 272, def: 70, dodge: 70, int: 272, spd: 272, crit: 100, critDmg: 272, vamp: 272, reflect: 272 };

    function getSkillPointsByLevel(level) {
        if (level <= 1) return 0;
        let points = 0;
        for (let lvl = 2; lvl <= level; lvl++) {
            points += (lvl <= 14) ? 3 : 5;
        }
        return points;
    }

    // ==================== РАСЧЁТ СТАТОВ ====================
    function calculateStats(className, subclass, distribution, level) {
        const base = baseStats[className];
        let stats = {
            hp: base.hp + (distribution.hp || 0) * 5,
            atk: base.atk + (distribution.atk || 0),
            def: base.def + (distribution.def || 0),
            agi: base.agi + (distribution.dodge || 0),
            int: base.int + (distribution.int || 0),
            spd: base.spd + (distribution.spd || 0),
            crit: base.crit + (distribution.crit || 0),
            critDmg: 1.5 + (distribution.critDmg || 0) / 50,
            vamp: base.vamp + (distribution.vamp || 0),
            reflect: base.reflect + (distribution.reflect || 0),
            manaMax: 100,
            manaRegen: className === 'warrior' ? 15 : (className === 'assassin' ? 18 : 30)
        };

        // Пассивки подклассов
        const bonus = rolePassives[subclass] || {};
        if (bonus.vamp) stats.vamp += bonus.vamp;
        if (bonus.reflect) stats.reflect += bonus.reflect;
        if (subclass === 'assassin') stats.critDmg += 0.5; // убийца: +50% крит урона

        // Классовые особенности
        if (className === 'warrior') {
            stats.hp += Math.floor(stats.def / 5) * 5;
            stats.hp = Math.floor(stats.hp * 1.1);
        }
        if (className === 'assassin') {
            stats.spd += Math.floor(stats.agi / 5);
        }
        if (className === 'mage') {
            stats.agi += Math.floor(stats.int / 5);
            stats.manaRegen += Math.floor(stats.int / 5) * 2;
        }

        // Страж: +10 защиты (макс 80)
        if (className === 'warrior' && subclass === 'guardian') {
            stats.def = Math.min(80, stats.def + 10);
        }

        // Лимиты
        stats.def = Math.min(80, stats.def);
        stats.agi = Math.min(70, stats.agi);
        stats.crit = Math.min(100, stats.crit);
        stats.critDmg = Math.min(4.5, stats.critDmg);
        // Реген маны не более 45
        stats.manaRegen = Math.min(45, stats.manaRegen);
        stats.level = level;

        // Округления
        stats.hp = Math.round(stats.hp);
        stats.atk = Math.round(stats.atk);
        stats.def = Math.round(stats.def * 10) / 10;
        stats.agi = Math.round(stats.agi * 10) / 10;
        stats.int = Math.round(stats.int * 10) / 10;
        stats.spd = Math.round(stats.spd);
        stats.crit = Math.round(stats.crit * 10) / 10;
        stats.critDmg = Math.round(stats.critDmg * 100) / 100;
        stats.vamp = Math.round(stats.vamp);
        stats.reflect = Math.round(stats.reflect);

        return stats;
    }

    // ==================== БОЕВЫЕ ФУНКЦИИ ====================
    function getBerserkerRage(hpPercent) {
        if (hpPercent < 20) return { level: 5, bonus: 100 };
        if (hpPercent < 35) return { level: 4, bonus: 60 };
        if (hpPercent < 50) return { level: 3, bonus: 45 };
        if (hpPercent < 65) return { level: 2, bonus: 30 };
        if (hpPercent < 80) return { level: 1, bonus: 15 };
        return { level: 0, bonus: 0 };
    }

    function performAttack(attackerStats, defenderStats, attackerVamp, defenderReflect, attackerName, defenderName, attackerClass, attackerSubclass, defenderSubclass, attackerState, defenderState, isPlayerAttacker) {
        let extraLogs = [];

        // Иллюзионист: уворот каждые 4 хода
        if (defenderSubclass === 'illusionist') {
            defenderState.mirageCounter = (defenderState.mirageCounter || 0) + 1;
            if (defenderState.mirageCounter >= 4) {
                defenderState.mirageCounter = 0;
                // При увороте: атакующий теряет 10 маны, защитник получает 5
                attackerState.mana = Math.max(0, (attackerState.mana || 0) - 10);
                defenderState.mana = Math.min(100, (defenderState.mana || 0) + 5);
                extraLogs.push({ text: `${attackerName} промахивается и теряет 10 маны. ${defenderName} восстанавливает 5 маны.`, type: 'mana_effect', attacker: isPlayerAttacker ? 'player' : 'enemy' });
                return { hit: false, damage: 0, isCrit: false, log: `<strong>${defenderName}</strong> исчезает в мираже и уклоняется!`, reflectDamage: 0, vampHeal: 0, stateChanges: { mirageCounter: 0 }, extraLogs };
            }
        }

        // Стандартное уклонение
        const hitChance = Math.min(100, Math.max(5, 100 - defenderStats.agi));
        const isDodge = Math.random() * 100 > hitChance;
        if (isDodge) {
            attackerState.mana = Math.max(0, (attackerState.mana || 0) - 10);
            defenderState.mana = Math.min(100, (defenderState.mana || 0) + 5);
            extraLogs.push({ text: `${attackerName} промахивается и теряет 10 маны. ${defenderName} восстанавливает 5 маны.`, type: 'mana_effect', attacker: isPlayerAttacker ? 'player' : 'enemy' });
            return { hit: false, damage: 0, isCrit: false, log: `<strong>${defenderName}</strong> уклоняется от атаки!`, reflectDamage: 0, vampHeal: 0, stateChanges: {}, extraLogs };
        }

        // Блок Стража
        if (defenderSubclass === 'guardian' && Math.random() * 100 < 20) {
            return { hit: false, damage: 0, isCrit: false, log: `<strong>${defenderName}</strong> блокирует удар!`, reflectDamage: 0, vampHeal: 0, stateChanges: {}, extraLogs };
        }

        let damage = attackerStats.atk;
        let berserkerBonus = 0;
        let selfDamage = 0;

        // Берсерк
        if (attackerSubclass === 'berserker') {
            const hpPercent = (attackerState.hp / attackerStats.hp) * 100;
            const rage = getBerserkerRage(hpPercent);
            if (rage.bonus > 0) {
                damage += Math.ceil(attackerStats.atk * rage.bonus / 100);
                berserkerBonus = rage.bonus;
            }
            selfDamage = Math.max(1, Math.ceil(damage * 0.16));
            attackerState.hp = Math.max(1, attackerState.hp - selfDamage);
            extraLogs.push({ text: `<strong>${attackerName}</strong> наносит себе ${selfDamage} урона от ярости!`, type: 'damage_self', attacker: isPlayerAttacker ? 'player' : 'enemy' });
        }

        let isCrit = false;
        let effectiveCritDmg = attackerStats.critDmg;
        if (attackerState.critDmgBuff && attackerState.critDmgBuffDuration > 0) effectiveCritDmg += attackerState.critDmgBuff;
        if (Math.random() * 100 < attackerStats.crit) {
            isCrit = true;
            damage *= effectiveCritDmg;
        }

        damage = damage * (1 - defenderStats.def / 100);
        damage = Math.max(1, Math.floor(damage));

        let vampHeal = 0;
        if (attackerVamp > 0) vampHeal = Math.floor(damage * attackerVamp / 100);
        let reflectDamage = 0;
        if (defenderReflect > 0) reflectDamage = Math.floor(damage * defenderReflect / 100);

        // Яд venom_blade
        if (attackerSubclass === 'venom_blade') {
            defenderState.poisonStacks = Math.min(5, (defenderState.poisonStacks || 0) + 1);
            extraLogs.push({ text: `<strong>${defenderName}</strong> отравлен! Стаков яда: ${defenderState.poisonStacks}/5`, type: 'poison_stack', attacker: isPlayerAttacker ? 'player' : 'enemy' });
        }
        // Поджог pyromancer
        if (attackerSubclass === 'pyromancer') {
            defenderState.burnStacks = Math.min(5, (defenderState.burnStacks || 0) + 1);
            extraLogs.push({ text: `<strong>${defenderName}</strong> подожжён! Стаков огня: ${defenderState.burnStacks}/5`, type: 'burn_stack', attacker: isPlayerAttacker ? 'player' : 'enemy' });
        }
        // Заморозка cryomancer
        if (attackerSubclass === 'cryomancer') {
            if (defenderState.frozen > 0) {
                extraLogs.push({ text: `<strong>${defenderName}</strong> уже заморожен.`, type: 'frozen_already', attacker: isPlayerAttacker ? 'player' : 'enemy' });
            } else {
                defenderState.freezeStacks = (defenderState.freezeStacks || 0) + 1;
                if (defenderState.freezeStacks >= 3) {
                    defenderState.frozen = 1;
                    defenderState.freezeStacks = 0;
                    extraLogs.push({ text: `<strong>${defenderName}</strong> замерзает и пропускает ход!`, type: 'frozen_enter', attacker: isPlayerAttacker ? 'player' : 'enemy' });
                } else {
                    extraLogs.push({ text: `Лед накапливается: ${defenderState.freezeStacks}/3.`, type: 'freeze_stack', attacker: isPlayerAttacker ? 'player' : 'enemy' });
                }
            }
        }

        const critText = isCrit ? 'КРИТИЧЕСКИЙ УДАР! ' : '';
        let logText = `<strong>${attackerName}</strong> ${critText}наносит ${damage} урона <strong>${defenderName}</strong>.`;
        if (berserkerBonus > 0) logText += ` (Ярость +${berserkerBonus}%)`;

        return {
            hit: true, damage, isCrit, log: logText,
            reflectDamage, vampHeal, selfDamage,
            stateChanges: { poisonStacks: defenderState.poisonStacks, burnStacks: defenderState.burnStacks, freezeStacks: defenderState.freezeStacks, frozen: defenderState.frozen },
            extraLogs
        };
    }

    function performActiveSkill(attackerStats, defenderStats, attackerState, defenderState, attackerName, defenderName, attackerSubclass, defenderSubclass) {
        let damage = 0, heal = 0, selfDamage = 0, log = '', type = 'ult';
        switch (attackerSubclass) {
            case 'guardian':
                heal = Math.floor(attackerStats.hp * 0.2);
                log = `<strong>${attackerName}</strong> использует Несокрушимость и восстанавливает ${heal} HP, снимая все негативные эффекты.`;
                attackerState.poisonStacks = attackerState.burnStacks = attackerState.freezeStacks = attackerState.frozen = 0;
                type = 'heal';
                break;
            case 'berserker':
                if (attackerState.hp <= 0) return { damage:0, heal:0, log: `${attackerName} не может использовать умение.`, selfDamage:0, stateChanges:{}, type:'none' };
                damage = Math.floor(attackerStats.atk * 2 * (attackerStats.critDmg + 0.5));
                selfDamage = Math.floor(attackerState.hp * 0.6);
                selfDamage = Math.min(selfDamage, attackerState.hp - 1);
                attackerState.hp -= selfDamage;
                log = `<strong>${attackerName}</strong> использует Кровопускание, теряет ${selfDamage} HP и наносит ${damage} урона с гарантированным критом!`;
                type = 'damage_self';
                break;
            case 'knight':
                attackerState.reflectBuff = 2;
                attackerState.reflectBonus = 50;
                log = `<strong>${attackerName}</strong> активирует Щит правосудия: +50% отражения на 2 хода, снятие негативных эффектов.`;
                attackerState.poisonStacks = attackerState.burnStacks = attackerState.freezeStacks = attackerState.frozen = 0;
                type = 'buff';
                break;
            case 'assassin':
                damage = Math.floor(attackerStats.atk * (attackerStats.critDmg + 1.5));
                log = `<strong>${attackerName}</strong> наносит Смертельный удар: ${damage} урона!`;
                type = 'damage';
                break;
            case 'venom_blade':
                let baseDamage = Math.max(1, Math.floor(attackerStats.atk * (1 - defenderStats.def/100)));
                let poisonDamage = (defenderState.poisonStacks || 0) * 5;
                damage = baseDamage + poisonDamage;
                log = `<strong>${attackerName}</strong> использует Ядовитую волну: ${damage} урона (${poisonDamage} от яда).`;
                defenderState.poisonStacks = 0;
                type = 'poison_ult';
                break;
            case 'blood_hunter':
                damage = Math.floor(attackerStats.atk * 1.5 * (1 + attackerStats.int/100));
                attackerState.vampBuff = 2;
                attackerState.vampBonus = 50;
                attackerState.critDmgBuff = 1.0;
                attackerState.critDmgBuffDuration = 2;
                log = `<strong>${attackerName}</strong> активирует Кровавую жатву: +50% вампиризма и +100% крит. урона на 2 хода, наносит ${damage} урона.`;
                type = 'damage';
                break;
            case 'pyromancer':
                damage = Math.floor(attackerStats.int * 1.8) + ((defenderState.burnStacks || 0) * 2);
                log = `<strong>${attackerName}</strong> призывает Огненный шторм: ${damage} урона!`;
                defenderState.burnStacks = 0;
                type = 'fire_ult';
                break;
            case 'cryomancer':
                const isTargetFrozen = defenderState.frozen > 0;
                damage = Math.round(attackerStats.int * (isTargetFrozen ? 2.5 : 1.6));
                log = `<strong>${attackerName}</strong> использует Вечную зиму: ${damage} урона${isTargetFrozen ? ' (замороженная цель x2.5)' : ''}.`;
                if (!isTargetFrozen) defenderState.frozen = 1;
                defenderState.freezeStacks = 0;
                type = 'ice_ult';
                break;
            case 'illusionist':
                damage = Math.floor(defenderStats.atk * 2 * (1 + attackerStats.int/100));
                log = `<strong>${attackerName}</strong> использует Зазеркалье: заставляет <strong>${defenderName}</strong> атаковать себя на ${damage} урона!`;
                type = 'damage';
                break;
            default:
                return { damage:0, heal:0, log: 'ничего не произошло', selfDamage:0, stateChanges:{}, type:'none' };
        }
        attackerState.manaRegenDisabled = true;
        attackerState.manaRegenDisabledDuration = 1;
        return { damage, heal, log, selfDamage, stateChanges: { poisonStacks: defenderState.poisonStacks, burnStacks: defenderState.burnStacks, freezeStacks: defenderState.freezeStacks, frozen: defenderState.frozen }, type };
    }

    function applyDotDamage(state, name) {
        let totalDamage = 0, logs = [];
        if (state.poisonStacks > 0) {
            const dmg = state.poisonStacks * 2;
            totalDamage += dmg;
            logs.push({ text: `<strong>${name}</strong> получает ${dmg} урона от яда.`, type: 'poison_dot' });
        }
        if (state.burnStacks > 0) {
            const dmg = state.burnStacks * 2;
            totalDamage += dmg;
            logs.push({ text: `<strong>${name}</strong> получает ${dmg} урона от огня.`, type: 'burn_dot' });
        }
        return { damage: totalDamage, logs };
    }

    function simulateBattle(playerStats, enemyStats, playerClass, enemyClass, playerName, enemyName, playerSubclass, enemySubclass) {
        let playerHp = playerStats.hp, enemyHp = enemyStats.hp;
        let playerMana = 0, enemyMana = 0;
        let messages = [];

        let playerState = { 
            poisonStacks:0, burnStacks:0, freezeStacks:0, frozen:0,
            reflectBuff:0, reflectBonus:0, vampBuff:0, vampBonus:0,
            mirageCounter:0, mana:0, hp: playerHp,
            critDmgBuff:0, critDmgBuffDuration:0,
            manaRegenDisabled: false, manaRegenDisabledDuration: 0
        };
        let enemyState = { 
            poisonStacks:0, burnStacks:0, freezeStacks:0, frozen:0,
            reflectBuff:0, reflectBonus:0, vampBuff:0, vampBonus:0,
            mirageCounter:0, mana:0, hp: enemyHp,
            critDmgBuff:0, critDmgBuffDuration:0,
            manaRegenDisabled: false, manaRegenDisabledDuration: 0
        };

        let turn = (playerStats.spd > enemyStats.spd) ? 'player' : (enemyStats.spd > playerStats.spd) ? 'enemy' : (Math.random() < 0.5 ? 'player' : 'enemy');
        let maxTurns = 200, t = 0;

        while (playerHp > 0 && enemyHp > 0 && t < maxTurns) {
            t++;
            if (turn === 'player') {
                if (playerState.frozen > 0) {
                    playerState.frozen--;
                    messages.push({ text: `<strong>${playerName}</strong> заморожен и пропускает ход.`, type: 'frozen_continue', attacker: 'player' });
                    turn = 'enemy';
                    continue;
                }
                let regen = playerStats.manaRegen;
                if (playerState.manaRegenDisabled && playerState.manaRegenDisabledDuration > 0) {
                    regen = 0;
                    playerState.manaRegenDisabledDuration--;
                    if (playerState.manaRegenDisabledDuration === 0) playerState.manaRegenDisabled = false;
                }
                playerMana = Math.min(100, playerMana + regen);
                playerState.mana = playerMana;

                let actionLog = null;
                if (playerMana >= 100) {
                    const skill = performActiveSkill(playerStats, enemyStats, playerState, enemyState, playerName, enemyName, playerSubclass, enemySubclass);
                    if (skill.damage) enemyHp -= skill.damage;
                    if (skill.heal) playerHp += skill.heal;
                    if (skill.selfDamage) playerHp -= skill.selfDamage;
                    playerHp = Math.max(0, playerHp);
                    enemyHp = Math.max(0, enemyHp);
                    actionLog = { text: skill.log, type: skill.type, attacker: 'player' };
                    messages.push(actionLog);
                    playerMana -= 100;
                    playerState.mana = playerMana;
                    if (skill.stateChanges) Object.assign(enemyState, skill.stateChanges);
                } else {
                    const attackResult = performAttack(
                        playerStats, enemyStats,
                        playerStats.vamp + (playerState.vampBuff > 0 ? playerState.vampBonus : 0),
                        enemyStats.reflect + (enemyState.reflectBuff > 0 ? enemyState.reflectBonus : 0),
                        playerName, enemyName, playerClass, playerSubclass, enemySubclass,
                        playerState, enemyState, true
                    );
                    if (attackResult.hit) {
                        enemyHp -= attackResult.damage;
                        playerHp += attackResult.vampHeal;
                        playerHp -= attackResult.reflectDamage;
                        playerHp = Math.max(0, playerHp);
                        enemyHp = Math.max(0, enemyHp);
                        actionLog = { text: attackResult.log, type: attackResult.isCrit ? 'crit' : 'attack', attacker: 'player' };
                        if (attackResult.vampHeal > 0) actionLog.text += ` Вампиризм +${attackResult.vampHeal}.`;
                        if (attackResult.reflectDamage > 0) actionLog.text += ` Отражение -${attackResult.reflectDamage}.`;
                        messages.push(actionLog);
                        if (attackResult.extraLogs) attackResult.extraLogs.forEach(extra => messages.push(extra));
                    } else {
                        messages.push({ text: attackResult.log, type: 'dodge', attacker: 'player' });
                    }
                    if (attackResult.stateChanges) Object.assign(enemyState, attackResult.stateChanges);
                }
                turn = 'enemy';
            } else {
                if (enemyState.frozen > 0) {
                    enemyState.frozen--;
                    messages.push({ text: `<strong>${enemyName}</strong> заморожен и пропускает ход.`, type: 'frozen_continue', attacker: 'enemy' });
                    turn = 'player';
                    continue;
                }
                let regen = enemyStats.manaRegen;
                if (enemyState.manaRegenDisabled && enemyState.manaRegenDisabledDuration > 0) {
                    regen = 0;
                    enemyState.manaRegenDisabledDuration--;
                    if (enemyState.manaRegenDisabledDuration === 0) enemyState.manaRegenDisabled = false;
                }
                enemyMana = Math.min(100, enemyMana + regen);
                enemyState.mana = enemyMana;

                let actionLog = null;
                if (enemyMana >= 100) {
                    const skill = performActiveSkill(enemyStats, playerStats, enemyState, playerState, enemyName, playerName, enemySubclass, playerSubclass);
                    if (skill.damage) playerHp -= skill.damage;
                    if (skill.heal) enemyHp += skill.heal;
                    if (skill.selfDamage) enemyHp -= skill.selfDamage;
                    playerHp = Math.max(0, playerHp);
                    enemyHp = Math.max(0, enemyHp);
                    actionLog = { text: skill.log, type: skill.type, attacker: 'enemy' };
                    messages.push(actionLog);
                    enemyMana -= 100;
                    enemyState.mana = enemyMana;
                    if (skill.stateChanges) Object.assign(playerState, skill.stateChanges);
                } else {
                    const attackResult = performAttack(
                        enemyStats, playerStats,
                        enemyStats.vamp + (enemyState.vampBuff > 0 ? enemyState.vampBonus : 0),
                        playerStats.reflect + (playerState.reflectBuff > 0 ? playerState.reflectBonus : 0),
                        enemyName, playerName, enemyClass, enemySubclass, playerSubclass,
                        enemyState, playerState, false
                    );
                    if (attackResult.hit) {
                        playerHp -= attackResult.damage;
                        enemyHp += attackResult.vampHeal;
                        enemyHp -= attackResult.reflectDamage;
                        playerHp = Math.max(0, playerHp);
                        enemyHp = Math.max(0, enemyHp);
                        actionLog = { text: attackResult.log, type: attackResult.isCrit ? 'crit' : 'attack', attacker: 'enemy' };
                        if (attackResult.vampHeal > 0) actionLog.text += ` Вампиризм +${attackResult.vampHeal}.`;
                        if (attackResult.reflectDamage > 0) actionLog.text += ` Отражение -${attackResult.reflectDamage}.`;
                        messages.push(actionLog);
                        if (attackResult.extraLogs) attackResult.extraLogs.forEach(extra => messages.push(extra));
                    } else {
                        messages.push({ text: attackResult.log, type: 'dodge', attacker: 'enemy' });
                    }
                    if (attackResult.stateChanges) Object.assign(playerState, attackResult.stateChanges);
                }
                turn = 'player';
            }

            if (playerState.critDmgBuffDuration > 0) playerState.critDmgBuffDuration--;
            if (enemyState.critDmgBuffDuration > 0) enemyState.critDmgBuffDuration--;
            if (playerState.reflectBuff > 0) playerState.reflectBuff--;
            if (enemyState.reflectBuff > 0) enemyState.reflectBuff--;

            if (turn === 'player') {
                const playerDot = applyDotDamage(playerState, playerName);
                const enemyDot = applyDotDamage(enemyState, enemyName);
                if (playerDot.damage > 0) {
                    playerHp = Math.max(0, playerHp - playerDot.damage);
                    playerDot.logs.forEach(log => messages.push(log));
                }
                if (enemyDot.damage > 0) {
                    enemyHp = Math.max(0, enemyHp - enemyDot.damage);
                    enemyDot.logs.forEach(log => messages.push(log));
                }
            }
        }

        let winner = (playerHp <= 0 && enemyHp <= 0) ? 'draw' : (playerHp <= 0) ? 'enemy' : (enemyHp <= 0) ? 'player' : 'draw';
        return { winner, playerHpRemain: playerHp, enemyHpRemain: enemyHp, messages };
    }

    // ==================== ГЕНЕРАЦИЯ ПРОТИВНИКОВ ====================
    function generateRandomOpponent(level) {
        const classes = ['warrior', 'assassin', 'mage'];
        const className = classes[Math.floor(Math.random() * 3)];
        const subOptions = subclasses[className];
        const subclass = subOptions[Math.floor(Math.random() * subOptions.length)];
        const totalPoints = getSkillPointsByLevel(level);
        const weights = {
            warrior: { hp: 30, atk: 20, def: 25, dodge: 5, int: 2, spd: 5, crit: 8, critDmg: 5, vamp: 0, reflect: 0 },
            assassin: { hp: 15, atk: 25, def: 5, dodge: 20, int: 2, spd: 10, crit: 15, critDmg: 8, vamp: 0, reflect: 0 },
            mage: { hp: 15, atk: 10, def: 5, dodge: 15, int: 30, spd: 10, crit: 10, critDmg: 5, vamp: 0, reflect: 0 }
        };
        const w = weights[className];
        let dist = {};
        for (let key of skillKeys) dist[key] = 0;
        let remaining = totalPoints;
        let attempts = 0;
        while (remaining > 0 && attempts < 1000) {
            for (let key of skillKeys) {
                if (remaining <= 0) break;
                let maxAdd = Math.min(remaining, absoluteMax[key] - dist[key]);
                if (maxAdd <= 0) continue;
                let prob = w[key] || 1;
                let add = Math.min(maxAdd, Math.max(1, Math.floor(remaining * prob / 100)));
                if (add > 0) {
                    dist[key] += add;
                    remaining -= add;
                }
            }
            attempts++;
        }
        let keys = skillKeys.filter(k => dist[k] < absoluteMax[k]);
        while (remaining > 0 && keys.length) {
            for (let k of keys) {
                if (remaining <= 0) break;
                if (dist[k] < absoluteMax[k]) { dist[k]++; remaining--; }
            }
            keys = skillKeys.filter(k => dist[k] < absoluteMax[k]);
        }
        const stats = calculateStats(className, subclass, dist, level);
        return { className, subclass, stats, name: `${subclassNames[subclass]} ${Math.floor(Math.random()*100)}` };
    }

    // ==================== UI КАЛЬКУЛЯТОРА ====================
    let currentClassName = 'warrior';
    let currentSubclass = 'guardian';
    let currentLevel = 60;
    let totalPoints = getSkillPointsByLevel(60);
    let currentDistribution = {};
    let freePoints = totalPoints;
    let sliders = {}, numberInputs = {};

    function getMaxPointsForStat(statKey, baseValue) {
        // Максимальное количество ОЧКОВ, которые можно вложить в эту характеристику
        return Math.max(0, absoluteMax[statKey] - baseValue);
    }

    function updateUI() {
        const base = baseStats[currentClassName];
        for (let key of skillKeys) {
            let baseVal = 0;
            if (key === 'hp') baseVal = base.hp;
            else if (key === 'atk') baseVal = base.atk;
            else if (key === 'def') baseVal = base.def;
            else if (key === 'dodge') baseVal = base.agi;
            else if (key === 'int') baseVal = base.int;
            else if (key === 'spd') baseVal = base.spd;
            else if (key === 'crit') baseVal = base.crit;
            else if (key === 'critDmg') baseVal = base.critDmg;
            else if (key === 'vamp') baseVal = base.vamp;
            else if (key === 'reflect') baseVal = base.reflect;
            const maxPoints = getMaxPointsForStat(key, baseVal);
            const val = currentDistribution[key] || 0;
            if (sliders[key]) {
                sliders[key].max = maxPoints;
                sliders[key].value = Math.min(val, maxPoints);
                numberInputs[key].max = maxPoints;
                numberInputs[key].value = Math.min(val, maxPoints);
            }
        }
        document.getElementById('freePointsDisplay').innerHTML = `📊 Свободные очки: ${freePoints}`;
    }

    function adjustStat(statKey, delta) {
        if (delta === 0) return;
        let oldVal = currentDistribution[statKey] || 0;
        let newVal = oldVal + delta;
        const base = baseStats[currentClassName];
        let baseVal = 0;
        if (statKey === 'hp') baseVal = base.hp;
        else if (statKey === 'atk') baseVal = base.atk;
        else if (statKey === 'def') baseVal = base.def;
        else if (statKey === 'dodge') baseVal = base.agi;
        else if (statKey === 'int') baseVal = base.int;
        else if (statKey === 'spd') baseVal = base.spd;
        else if (statKey === 'crit') baseVal = base.crit;
        else if (statKey === 'critDmg') baseVal = base.critDmg;
        else if (statKey === 'vamp') baseVal = base.vamp;
        else if (statKey === 'reflect') baseVal = base.reflect;
        const maxPoints = getMaxPointsForStat(statKey, baseVal);
        newVal = Math.min(maxPoints, Math.max(0, newVal));
        const realDelta = newVal - oldVal;
        if (realDelta === 0) return;
        if (realDelta > 0) {
            if (freePoints >= realDelta) {
                currentDistribution[statKey] = newVal;
                freePoints -= realDelta;
            } else return;
        } else {
            currentDistribution[statKey] = newVal;
            freePoints += -realDelta;
        }
        updateUI();
        updateStatsDisplay();
    }

    function resetToEqual() {
        let perStat = Math.floor(totalPoints / skillKeys.length);
        let remainder = totalPoints - perStat * skillKeys.length;
        const base = baseStats[currentClassName];
        for (let key of skillKeys) {
            let baseVal = 0;
            if (key === 'hp') baseVal = base.hp;
            else if (key === 'atk') baseVal = base.atk;
            else if (key === 'def') baseVal = base.def;
            else if (key === 'dodge') baseVal = base.agi;
            else if (key === 'int') baseVal = base.int;
            else if (key === 'spd') baseVal = base.spd;
            else if (key === 'crit') baseVal = base.crit;
            else if (key === 'critDmg') baseVal = base.critDmg;
            else if (key === 'vamp') baseVal = base.vamp;
            else if (key === 'reflect') baseVal = base.reflect;
            const maxPoints = getMaxPointsForStat(key, baseVal);
            let val = Math.min(perStat, maxPoints);
            currentDistribution[key] = val;
        }
        let spent = 0;
        for (let key of skillKeys) spent += currentDistribution[key];
        freePoints = totalPoints - spent;
        if (freePoints < 0) freePoints = 0;
        updateUI();
        updateStatsDisplay();
    }

    function resetAll() {
        for (let key of skillKeys) currentDistribution[key] = 0;
        freePoints = totalPoints;
        updateUI();
        updateStatsDisplay();
    }

    function updateStatsDisplay() {
        const stats = calculateStats(currentClassName, currentSubclass, currentDistribution, currentLevel);
        const resultDiv = document.getElementById('result');
        resultDiv.innerHTML = `
            <div class="result-row"><strong>${subclassNames[currentSubclass]} (${currentClassName === 'warrior' ? 'Воин' : currentClassName === 'assassin' ? 'Ассасин' : 'Маг'})</strong></div>
            <div class="result-row">❤️ HP: ${stats.hp}</div>
            <div class="result-row">⚔️ Атака: ${stats.atk}</div>
            <div class="result-row">🛡️ Защита: ${stats.def}%</div>
            <div class="result-row">🏃 Ловкость: ${stats.agi}%</div>
            <div class="result-row">🧠 Интеллект: ${stats.int}%</div>
            <div class="result-row">⚡ Скорость: ${stats.spd}</div>
            <div class="result-row">🎯 Шанс крита: ${stats.crit}%</div>
            <div class="result-row">💥 Крит. урон: ${(stats.critDmg*100).toFixed(0)}%</div>
            <div class="result-row">🩸 Вампиризм: ${stats.vamp}%</div>
            <div class="result-row">🛡️ Отражение: ${stats.reflect}%</div>
            <div class="result-row">🌀 Мана: ${stats.manaMax} | Реген: ${stats.manaRegen}/ход</div>
        `;
    }

    async function runSimulation() {
        const btn = document.getElementById('simulateBtn');
        btn.disabled = true;
        btn.textContent = '⏳ Симуляция... 0/1000';
        const playerStats = calculateStats(currentClassName, currentSubclass, currentDistribution, currentLevel);
        let wins = 0;
        for (let i = 0; i < 1000; i++) {
            const enemy = generateRandomOpponent(currentLevel);
            const result = simulateBattle(
                playerStats, enemy.stats,
                currentClassName, enemy.className,
                subclassNames[currentSubclass], enemy.name,
                currentSubclass, enemy.subclass
            );
            if (result.winner === 'player') wins++;
            if ((i+1) % 100 === 0) {
                btn.textContent = `⏳ Симуляция... ${i+1}/1000`;
                await new Promise(r => setTimeout(r, 5));
            }
        }
        const winRate = (wins / 10).toFixed(1);
        const resultDiv = document.getElementById('result');
        const simBlock = document.createElement('div');
        simBlock.className = 'sim-result';
        simBlock.innerHTML = `⚔️ РЕЗУЛЬТАТ СИМУЛЯЦИИ (1000 противников, уровень ${currentLevel})<br>
                              🏆 Побед: ${wins} из 1000 (${winRate}%)<br>
                              📊 Противники имеют случайные классы/подклассы и разумное распределение очков.<br>
                              🌀 Увороты: атакующий теряет 10 маны, защитник получает 5 маны. Реген маны ≤45.`;
        const oldSim = resultDiv.querySelector('.sim-result');
        if (oldSim) oldSim.remove();
        resultDiv.appendChild(simBlock);
        btn.disabled = false;
        btn.textContent = '▶ Симуляция 1000 боёв (все механики)';
    }

    function renderSkillsUI() {
        const container = document.getElementById('skills');
        container.innerHTML = '';
        for (let key of skillKeys) {
            const div = document.createElement('div');
            div.className = 'stat-item';
            div.innerHTML = `
                <div class="stat-label">
                    <span>${skillNames[key]}</span>
                    <input type="number" id="num_${key}" class="stat-number" value="0" min="0" step="1">
                </div>
                <input type="range" id="sld_${key}" class="slider" min="0" value="0" step="1">
            `;
            container.appendChild(div);
            const slider = div.querySelector(`#sld_${key}`);
            const number = div.querySelector(`#num_${key}`);
            sliders[key] = slider;
            numberInputs[key] = number;
            slider.addEventListener('input', (e) => {
                let newVal = parseInt(e.target.value);
                if (isNaN(newVal)) newVal = 0;
                const oldVal = currentDistribution[key] || 0;
                const delta = newVal - oldVal;
                if (delta !== 0) adjustStat(key, delta);
            });
            number.addEventListener('input', (e) => {
                let newVal = parseInt(e.target.value);
                if (isNaN(newVal)) newVal = 0;
                const oldVal = currentDistribution[key] || 0;
                const delta = newVal - oldVal;
                if (delta !== 0) adjustStat(key, delta);
            });
        }
        updateUI();
    }

    function updateSubclassSelect() {
        const select = document.getElementById('subclass');
        const list = subclasses[currentClassName];
        select.innerHTML = list.map(sc => `<option value="${sc}" ${currentSubclass === sc ? 'selected' : ''}>${subclassNames[sc]}</option>`).join('');
        currentSubclass = select.value;
        updateStatsDisplay();
    }

    function updateLevel() {
        currentLevel = parseInt(document.getElementById('level').value);
        totalPoints = getSkillPointsByLevel(currentLevel);
        let spent = 0;
        for (let key of skillKeys) spent += currentDistribution[key] || 0;
        if (spent > totalPoints) {
            let ratio = totalPoints / spent;
            for (let key of skillKeys) {
                currentDistribution[key] = Math.floor((currentDistribution[key] || 0) * ratio);
            }
            spent = 0;
            for (let key of skillKeys) spent += currentDistribution[key];
            freePoints = totalPoints - spent;
            if (freePoints < 0) freePoints = 0;
        } else {
            freePoints = totalPoints - spent;
        }
        updateUI();
        updateStatsDisplay();
    }

    function init() {
        resetAll();
        renderSkillsUI();
        document.getElementById('equalResetBtn').addEventListener('click', resetToEqual);
        document.getElementById('fullResetBtn').addEventListener('click', resetAll);
        document.getElementById('simulateBtn').addEventListener('click', runSimulation);
        document.querySelectorAll('.class-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.class-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentClassName = btn.dataset.class;
                updateSubclassSelect();
                resetAll(); // сброс распределения при смене класса
                updateUI();
                updateStatsDisplay();
            });
        });
        document.getElementById('subclass').addEventListener('change', (e) => {
            currentSubclass = e.target.value;
            updateStatsDisplay();
        });
        document.getElementById('level').addEventListener('change', () => updateLevel());
        document.querySelector('.class-btn[data-class="warrior"]').classList.add('active');
        updateSubclassSelect();
        updateStatsDisplay();
    }
    init();
</script>
