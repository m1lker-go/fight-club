<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cat Fighting</title>
    <link rel="icon" href="assets/favicon.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        .auth-container { text-align: center; }
        .auth-btn { width: 100%; margin: 10px 0; padding: 12px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .telegram-btn { background: #24A1DE; color: white; }
        .google-btn { background: #DB4437; color: white; }
        .vk-btn { background: #0077FF; color: white; }
        .email-btn { background: #555; color: white; }
        .auth-input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .auth-submit-btn { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        .modal-body { padding: 20px; }
    </style>
</head>
<body>
    <div id="app">
        <div id="splash-screen">
            <div class="splash-content">
                <h1 class="splash-title">Cat Fighting</h1>
                <p class="splash-subtitle">Загрузка...</p>
                <div class="spinner"></div>
            </div>
        </div>

        <div class="top-bar">
            <div class="power"><i class="fas fa-shield-alt"></i> <span id="power">0</span></div>
            <div class="stats">
                <span><i class="fas fa-trophy"></i> <span id="rating">0</span></span>
                <span><i class="fas fa-bolt"></i> <span id="energy">0</span></span>
            </div>
            <div class="wallet">
                <span><i class="fas fa-gem"></i> <span id="diamondCount">0</span></span>
                <span><i class="fas fa-coins"></i> <span id="coinCount">0</span></span>
            </div>
        </div>

        <div id="content"></div>

        <div class="bottom-menu">
            <div class="menu-item active" data-screen="main"><i class="fas fa-home"></i></div>
            <div class="menu-item" data-screen="tower"><i class="fas fa-chess-rook"></i></div>
            <div class="menu-item" data-screen="tasks"><i class="fas fa-calendar-alt"></i></div>
            <div class="menu-item" data-screen="rating"><i class="fas fa-chart-line"></i></div>
        </div>
    </div>

    <div id="roleModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div class="modal-header"><h2 id="modalTitle"></h2></div>
            <div id="modalBody" class="modal-body"></div>
        </div>
    </div>

    <div id="chestResultModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div class="modal-header"><h2>Получен предмет!</h2></div>
            <div id="chestResultBody" class="modal-body"></div>
        </div>
    </div>

    <div id="equipCompareModal" class="modal">
        <div class="modal-content" style="max-width: 500px;">
            <span class="close">&times;</span>
            <div class="modal-header"><h2>Сравнение предметов</h2></div>
            <div id="equipCompareBody" class="modal-body" style="display: flex; gap: 20px; justify-content: center;"></div>
        </div>
    </div>

    <div id="levelUpModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div class="modal-header"><h2>Уровень повышен!</h2></div>
            <div id="levelUpBody" class="modal-body"></div>
            <div style="text-align: center; margin-top: 20px;">
                <button class="btn" id="levelUpUpgradeBtn">Распределить</button>
                <button class="btn" id="levelUpLaterBtn">Позже</button>
            </div>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="js/constants.js"></script>
    <script src="js/helpers.js"></script>
    <script src="settings.js"></script>
    <script src="authModal.js"></script>
    <script src="app.js"></script>
    <script src="js/task-up.js"></script>
    <script src="js/screens.js"></script>
    <script src="js/battleUI.js"></script>
    <script src="js/battleLog.js"></script>
    <script src="js/tower.js"></script>
    <script src="js/forge.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
