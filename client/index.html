<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cat Fighting</title>
    
    <!-- Подключение стилей -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Шрифты -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Иконки -->
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
    
    <!-- Telegram WebApp -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- VK SDK -->
    <script src="https://vk.com/js/api/openapi.js?169" type="text/javascript"></script>
    <script src="https://unpkg.com/@vkid/sdk@<3.0.0/dist-sdk/umd/index.js"></script>
</head>
<body>
    <!-- Заставка -->
    <div id="splash-screen">
        <div class="splash-content">
            <h1 class="splash-title">Cat Fighting</h1>
            <p class="splash-subtitle">Загрузка...</p>
            <div class="spinner"></div>
        </div>
    </div>

    <div id="app">
        <!-- Верхняя панель -->
        <div class="top-bar">
            <div class="power"><i class="fas fa-fist-raised"></i> <span id="power">0</span></div>
            <div class="rating"><i class="fas fa-trophy"></i> <span id="rating">0</span></div>
            <div class="coins"><i class="fas fa-coins"></i> <span id="coinCount">0</span></div>
            <div class="diamonds"><i class="fas fa-gem"></i> <span id="diamondCount">0</span></div>
            <div class="energy"><i class="fas fa-bolt"></i> <span id="energy">0</span></div>
        </div>

        <!-- Контент -->
        <div id="content" class="content"></div>

        <!-- Нижнее меню (4 кнопки как было) -->
        <div class="bottom-menu">
            <div class="menu-item active" data-screen="main"><i class="fas fa-home"></i></div>
            <div class="menu-item" data-screen="tower"><i class="fas fa-chess-rook"></i></div>
            <div class="menu-item" data-screen="tasks"><i class="fas fa-tasks"></i></div>
            <div class="menu-item" data-screen="rating"><i class="fas fa-trophy"></i></div>
        </div>
    </div>

    <!-- Модальные окна -->
    <div id="roleModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle"></h2>
                <span class="close">&times;</span>
            </div>
            <div id="modalBody" class="modal-body"></div>
        </div>
    </div>

    <div id="chestResultModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Получен предмет!</h2>
                <span class="close">&times;</span>
            </div>
            <div id="chestResultBody" class="modal-body"></div>
            <div style="text-align: center; margin-top: 20px;">
                <button class="btn" onclick="document.getElementById('chestResultModal').style.display='none'">ОК</button>
            </div>
        </div>
    </div>

    <div id="levelUpModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Уровень повышен!</h2>
                <span class="close">&times;</span>
            </div>
            <div id="levelUpBody" class="modal-body"></div>
            <div style="display: flex; gap: 10px; justify-content: center; margin-top: 20px;">
                <button class="btn" id="levelUpUpgradeBtn">Улучшить</button>
                <button class="btn" id="levelUpLaterBtn">Позже</button>
            </div>
        </div>
    </div>

    <div id="equipCompareModal" class="modal">
        <div class="modal-content" style="max-width: 600px;">
            <div class="modal-header">
                <h2>Сравнение предметов</h2>
                <span class="close">&times;</span>
            </div>
            <div id="equipCompareBody" class="modal-body" style="display: flex; gap: 20px; justify-content: center;"></div>
        </div>
    </div>

    <!-- СКРИПТЫ (Строгий порядок загрузки) -->
    <!-- 1. Константы и помощники -->
    <script src="js/constants.js"></script>
    <script src="js/helpers.js"></script>
    
    <!-- 2. Настройки и Авторизация (ДО app.js) -->
    <script src="settings.js"></script>
    <script src="authModal.js"></script>
    
    <!-- 3. Основное приложение -->
    <script src="app.js"></script>
    
    <!-- 4. Экраны и функционал -->
    <script src="js/screens.js"></script>
    <script src="js/task-up.js"></script>
    <script src="js/battleUI.js"></script>
    <script src="js/battleLog.js"></script>
    <script src="js/tower.js"></script>
    <script src="js/forge.js"></script>
    <script src="js/profile.js"></script>

    <!-- VK Callback -->
    <script>
        window.vkAuthCallback = function(response) {
            if (response && response.session) {
                const user = response.session.user;
                fetch(`${window.API_BASE || 'https://api.cat-fight.ru'}/auth/vk-lowcode`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user: user, access_token: response.session.sid })
                }).then(res => res.json()).then(data => {
                    if (data.success) {
                        localStorage.setItem('sessionToken', data.sessionToken);
                        if (data.needNickname) {
                            if (typeof showNicknameModal === 'function') showNicknameModal(data.userId);
                        } else {
                            location.reload();
                        }
                    } else {
                        console.error('VK Error:', data.error);
                    }
                }).catch(err => console.error('VK fetch error:', err));
            }
        };
    </script>
</body>
</html>
