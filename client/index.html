<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Cat Fighting</title>
    <link rel="stylesheet" href="style.css">
    <!-- CSS ресурсы – не блокируют загрузку, но можно оставить как есть -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- VK Bridge (обязателен для модерации) – загружается всегда, но не блокирует -->
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <!-- VK ID SDK (старая стабильная версия) -->
    <script src="https://unpkg.com/@vkid/sdk@<3.0.0/dist-sdk/umd/index.js"></script>
    
    <!-- Telegram WebApp SDK – загружаем сразу, если это Telegram (перед всеми скриптами) -->
    <script>
       (function() {
    function isTelegramWebApp() {
        // Проверяем URL parameters — они доступны сразу
        var search = window.location.search.toLowerCase();
        var hash = window.location.hash.toLowerCase();
        
        if (search.includes('tgwebappdata') || search.includes('tgauthtoken')) return true;
        if (hash.includes('tgwebappdata') || hash.includes('tgauthtoken')) return true;
        
        // Проверяем userAgent
        var ua = navigator.userAgent.toLowerCase();
        if (ua.includes('telegram')) return true;
        
        return false;
    }
    
    if (isTelegramWebApp()) {
        var script = document.createElement('script');
        script.src = 'https://telegram.org/js/telegram-web-app.js';
        script.async = false;
        document.head.appendChild(script);
        console.log('[Index] Загружен telegram-web-app.js (Telegram WebApp)');
    } else {
        console.log('[Index] Telegram WebApp не требуется, загрузка скрипта пропущена');
    }
})();
    </script>
    
    <!-- Иконки сайта -->
    <link rel="icon" type="image/png" href="/assets/favicon.png">
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
</head>
<body>
    <div id="splash-screen">
        <div class="splash-content">
            <h1 class="splash-title">Загрузка</h1>
            <p class="splash-subtitle">Пожалуйста, подождите</p>
            <div class="spinner"></div>
        </div>
    </div>

    <div id="app">
        <div class="top-bar">
            <div class="power"><i class="fas fa-fist-raised"></i> <span id="power">0</span></div>
            <div class="rating"><i class="fas fa-trophy"></i> <span id="rating">1000</span></div>
            <div class="coins"><i class="fas fa-coins"></i> <span id="coinCount">0</span></div>
            <div class="diamonds"><i class="fas fa-gem"></i> <span id="diamondCount">0</span></div>
            <div class="energy"><i class="fas fa-bolt"></i> <span id="energy">20</span></div>
        </div>

        <div id="content" class="content"></div>

        <div class="bottom-menu">
            <div class="menu-item" data-screen="main"><i class="fas fa-home"></i></div>
            <div class="menu-item" data-screen="tower"><i class="fas fa-chess-rook"></i></div>
            <div class="menu-item" data-screen="tasks"><i class="fas fa-tasks"></i></div>
            <div class="menu-item" data-screen="rating"><i class="fas fa-trophy"></i></div>
        </div>
    </div>

    <!-- Модальные окна -->
    <div id="roleModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Роли класса</h2>
                <span class="close">&times;</span>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <div id="chestResultModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Поздравляем!</h2>
                <span class="close" onclick="document.getElementById('chestResultModal').style.display='none'">&times;</span>
            </div>
            <div class="modal-body" id="chestResultBody"></div>
            <div style="text-align: center; margin-top: 20px;">
                <button class="btn" onclick="document.getElementById('chestResultModal').style.display='none'">ОК</button>
            </div>
        </div>
    </div>

    <div id="levelUpModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Поздравляем!</h2>
                <span class="close">&times;</span>
            </div>
            <div class="modal-body" id="levelUpBody"></div>
            <div style="display: flex; gap: 10px; justify-content: center; margin-top: 20px;">
                <button class="btn" id="levelUpUpgradeBtn">Улучшить</button>
                <button class="btn" id="levelUpLaterBtn">Потом</button>
            </div>
        </div>
    </div>

    <div id="equipCompareModal" class="modal" style="display: none;">
        <div class="modal-content" style="max-width: 600px;">
            <div class="modal-header">
                <h2>Сравнение предметов</h2>
                <span class="close">&times;</span>
            </div>
            <div class="modal-body" id="equipCompareBody" style="display: flex; gap: 20px; justify-content: center;"></div>
        </div>
    </div>

    <!-- Скрипты приложения (порядок важен) -->
    <script src="js/constants.js?v=2"></script>
    <script src="js/helpers.js?v=2"></script>
    <script src="js/audioManager.js?v=2"></script>
    <script src="js/vk-ads.js?v=2"></script>
    <script src="/js/messages-ui.js?v=2"></script>
    <script src="js/screens.js?v=2"></script>
   <!-- <script src="authModal.js?v=9"></script> -->
<script src="telegram-auth.js?v=1"></script>
    <script src="settings.js?v=2"></script>
    <script src="js/fortune.js?v=2"></script>
    <script src="/js/AnimationManager.js?v=2"></script>
    <script src="js/battleLog.js?v=2"></script>
    <script src="js/battleUI.js?v=2"></script>
    <script src="js/task-up.js?v=2"></script>
    <script src="js/forge.js?v=2"></script>
    <script src="js/tower.js?v=2"></script>
    <script src="js/mint.js?v=2"></script>
    <script src="js/gems.js?v=2"></script>
    <script src="app.js?v=3"></script>
    <script src="js/clans.js?v=2"></script>

    <!-- Дополнительный скрипт для VK в WebView (APK) -->
    <script>
        (function() {
            // Определяем WebView
            function isWebView() {
                if (typeof window.Android !== 'undefined') return true;
                if (window.isAppWebView === true) return true;
                var ua = navigator.userAgent.toLowerCase();
                if (/wv/.test(ua)) return true;
                if (/(android|iphone|ipad)/.test(ua) && !/chrome/.test(ua)) return true;
                if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData) return false;
                return false;
            }

            if (isWebView()) {
                var script = document.createElement('script');
                script.src = '/js/vk-webview.js';
                document.head.appendChild(script);
                console.log('[Index] Загружен vk-webview.js для WebView');
            }
        })();
    </script>
</body>
</html>
