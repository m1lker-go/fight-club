            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            justify-content: center;

        }
        .container {
            max-width: 600px;
            width: 100%;
            background-color: #2a303c;

            padding: 24px;

        a {

        a:hover {
            text-decoration: underline;
        }
        .buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        .btn {
            background-color: #2f3542;
            border: 2px solid #00aaff;
            border-radius: 40px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn i {
            font-size: 18px;
            color: #00aaff;
        }
        .btn:hover {
            background-color: #00aaff;
            color: #1a1f2b;
        }
        .btn:hover i {
            color: #1a1f2b;
        }
        .footer {
            margin-top: 24px;
            font-size: 12px;
            color: #aaa;
            text-align: center;
        }
