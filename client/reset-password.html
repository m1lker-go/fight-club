<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сброс пароля – Cat Fighting</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1f2b;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .reset-box {
            background: #2a303c;
            border-radius: 12px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .reset-box h2 {
            color: #00aaff;
            margin-bottom: 20px;
        }
        .auth-input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #1a1f2b;
            border: 1px solid #00aaff;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
        }
        .btn {
            background: #00aaff;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 30px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            color: white;
            margin-top: 15px;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .message {
            margin-top: 15px;
            font-size: 14px;
        }
        .success { color: #2ecc71; }
        .error { color: #e74c3c; }
    </style>
</head>
<body>
    <div class="reset-box">
        <h2>Сброс пароля</h2>
        <p style="color:#aaa;">Введите новый пароль (мин. 6 символов)</p>
        <input type="password" id="newPassword" class="auth-input" placeholder="Новый пароль">
        <input type="password" id="confirmPassword" class="auth-input" placeholder="Повторите пароль">
        <button class="btn" id="submitReset">Сохранить пароль</button>
        <div id="message" class="message"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const API_BASE = 'https://api.cat-fight.ru';

        document.getElementById('submitReset').addEventListener('click', async () => {
            const pwd1 = document.getElementById('newPassword').value;
            const pwd2 = document.getElementById('confirmPassword').value;
            const msgEl = document.getElementById('message');

            if (!pwd1 || !pwd2) {
                msgEl.textContent = 'Заполните оба поля';
                msgEl.className = 'message error';
                return;
            }
            if (pwd1.length < 6) {
                msgEl.textContent = 'Пароль должен быть не менее 6 символов';
                msgEl.className = 'message error';
                return;
            }
            if (pwd1 !== pwd2) {
                msgEl.textContent = 'Пароли не совпадают';
                msgEl.className = 'message error';
                return;
            }
            if (!token) {
                msgEl.textContent = 'Недействительная ссылка: отсутствует токен';
                msgEl.className = 'message error';
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword: pwd1 })
                });
                const data = await res.json();
                if (data.success) {
                    msgEl.textContent = 'Пароль успешно изменён! Можете войти в игру.';
                    msgEl.className = 'message success';
                    document.getElementById('newPassword').disabled = true;
                    document.getElementById('confirmPassword').disabled = true;
                    document.getElementById('submitReset').disabled = true;
                } else {
                    msgEl.textContent = 'Ошибка: ' + (data.error || 'неизвестная');
                    msgEl.className = 'message error';
                }
            } catch (err) {
                console.error(err);
                msgEl.textContent = 'Ошибка соединения с сервером';
                msgEl.className = 'message error';
            }
        });
    </script>
</body>
</html>
