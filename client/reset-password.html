<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сброс пароля – Cat Fighting</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1f2b;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .reset-box {
            background: #2a303c;
            border-radius: 12px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .reset-box h2 {
            color: #00aaff;
            margin-bottom: 20px;
        }
        .auth-input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #1a1f2b;
            border: 1px solid #00aaff;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
        }
        .btn {
            background: #00aaff;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 30px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            color: white;
            margin-top: 15px;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .message {
            margin-top: 15px;
            font-size: 14px;
        }
        .success { color: #2ecc71; }
        .error { color: #e74c3c; }
    </style>
</head>
<body>
    <div class="reset-box">
        <h2 id="resetTitle">Сброс пароля</h2>
        <p id="resetInstruction" style="color:#aaa;">Введите новый пароль (мин. 6 символов)</p>
        <input type="password" id="newPassword" class="auth-input" placeholder="Новый пароль">
        <input type="password" id="confirmPassword" class="auth-input" placeholder="Повторите пароль">
        <button class="btn" id="submitReset">Сохранить пароль</button>
        <div id="message" class="message"></div>
    </div>

    <!-- ============ ПОДКЛЮЧЕНИЕ i18next ============ -->
    <script src="https://cdn.jsdelivr.net/npm/i18next@23.7.6/dist/umd/i18next.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/i18next-http-backend@2.4.2/dist/umd/i18nextHttpBackend.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/i18next-browser-languagedetector@7.1.0/dist/umd/i18nextBrowserLanguageDetector.min.js"></script>
    
    <!-- Наш скрипт инициализации i18next -->
    <script src="/js/i18n.js"></script>
    <!-- ============================================ -->

    <script>
        // Дожидаемся инициализации i18next
        function waitForI18n(callback) {
            if (window.i18next && window.i18next.isInitialized) {
                callback();
            } else {
                const check = setInterval(() => {
                    if (window.i18next && window.i18next.isInitialized) {
                        clearInterval(check);
                        callback();
                    }
                }, 100);
            }
        }

        // Функция для обновления текстов на странице
        function updateTexts() {
            const __ = window.__ || (key => key);
            document.getElementById('resetTitle').textContent = __('auth:Сброс пароля', 'Сброс пароля');
            document.getElementById('resetInstruction').textContent = __('auth:Введите новый пароль (мин. 6 символов)', 'Введите новый пароль (мин. 6 символов)');
            document.getElementById('newPassword').placeholder = __('auth:Новый пароль', 'Новый пароль');
            document.getElementById('confirmPassword').placeholder = __('auth:Повторите пароль', 'Повторите пароль');
            document.getElementById('submitReset').textContent = __('auth:Сохранить пароль', 'Сохранить пароль');
        }

        waitForI18n(() => {
            updateTexts();
            // Подписываемся на смену языка (если понадобится)
            if (window.i18next) {
                window.i18next.on('languageChanged', updateTexts);
            }
        });

        // Остальная логика сброса (с использованием русских ключей)
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const API_BASE = 'https://api.cat-fight.ru';

        document.getElementById('submitReset').addEventListener('click', async () => {
            const pwd1 = document.getElementById('newPassword').value;
            const pwd2 = document.getElementById('confirmPassword').value;
            const msgEl = document.getElementById('message');

            function translate(key, fallback) {
                if (window.__) return window.__(key, fallback);
                return fallback;
            }

            if (!pwd1 || !pwd2) {
                msgEl.textContent = translate('auth:Заполните оба поля', 'Заполните оба поля');
                msgEl.className = 'message error';
                return;
            }
            if (pwd1.length < 6) {
                msgEl.textContent = translate('auth:Пароль должен быть не менее 6 символов', 'Пароль должен быть не менее 6 символов');
                msgEl.className = 'message error';
                return;
            }
            if (pwd1 !== pwd2) {
                msgEl.textContent = translate('auth:Пароли не совпадают', 'Пароли не совпадают');
                msgEl.className = 'message error';
                return;
            }
            if (!token) {
                msgEl.textContent = translate('auth:Недействительная ссылка: отсутствует токен', 'Недействительная ссылка: отсутствует токен');
                msgEl.className = 'message error';
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword: pwd1 })
                });
                const data = await res.json();
                if (data.success) {
                    msgEl.textContent = translate('auth:Пароль успешно изменён! Можете войти в игру.', 'Пароль успешно изменён! Можете войти в игру.');
                    msgEl.className = 'message success';
                    document.getElementById('newPassword').disabled = true;
                    document.getElementById('confirmPassword').disabled = true;
                    document.getElementById('submitReset').disabled = true;
                } else {
                    msgEl.textContent = translate('auth:Ошибка', 'Ошибка') + ': ' + (data.error || translate('common:неизвестная', 'неизвестная'));
                    msgEl.className = 'message error';
                }
            } catch (err) {
                console.error(err);
                msgEl.textContent = translate('auth:Ошибка соединения с сервером', 'Ошибка соединения с сервером');
                msgEl.className = 'message error';
            }
        });
    </script>
</body>
</html>
